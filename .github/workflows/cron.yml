name: "Cron: Dynamic Window"

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Compute Schedules
        id: cron_update
        env:
          PYTHONUNBUFFERED: "1"
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        shell: python
        run: |
          import json
          import os
          from datetime import datetime, timedelta, timezone
          import requests
          import re

          FANDOM_API = "https://lol.fandom.com/api.php"
          TOUR_PATH = "config/tour.json"
          WRANGLER_PATH = "wrangler.toml"
          BASELINE_CRON = "0 0 * * *"
          MAX_DYNAMIC_CRONS = 4
          WINDOW_PADDING_HOURS = 4
          ISO_DAY_NAMES = {1: "MON", 2: "TUE", 3: "WED", 4: "THU", 5: "FRI", 6: "SAT", 7: "SUN"}

          def fandom_login(username: str, password: str) -> requests.Session:
            session = requests.Session()
            session.headers.update({"User-Agent": "LoLStatsWorker/2026 (User:HsuX)"})

            token_resp = session.get(FANDOM_API, params={
              "action": "query",
              "meta": "tokens",
              "type": "login",
              "format": "json"
            }, timeout=20)
            token_resp.raise_for_status()
            login_token = token_resp.json().get("query", {}).get("tokens", {}).get("logintoken")
            if not login_token:
              raise RuntimeError("Failed to get Fandom login token")

            login_resp = session.post(FANDOM_API, data={
              "action": "login",
              "lgname": username,
              "lgpassword": password,
              "lgtoken": login_token,
              "format": "json"
            }, timeout=20)
            login_resp.raise_for_status()
            result = login_resp.json().get("login", {}).get("result")
            if result != "Success":
              raise RuntimeError(f"Fandom login failed: {result}")
            return session

          def fetch_matches_for_pages(session: requests.Session, pages: list[str], week_start: datetime, week_end: datetime):
            in_clause = ", ".join(f"'{page}'" for page in pages)
            where_clause = (
              f"OverviewPage IN ({in_clause}) "
              f"AND DateTime_UTC >= '{week_start.strftime('%Y-%m-%d %H:%M:%S')}' "
              f"AND DateTime_UTC <= '{week_end.strftime('%Y-%m-%d %H:%M:%S')}'"
            )
            all_rows = []
            offset = 0
            limit = 100
            while True:
              params = {
                "action": "cargoquery",
                "format": "json",
                "tables": "MatchSchedule",
                "fields": "DateTime_UTC=DateTimeUTC",
                "where": where_clause,
                "order_by": "DateTime_UTC ASC",
                "limit": str(limit),
                "offset": str(offset)
              }
              resp = session.get(FANDOM_API, params=params, timeout=30)
              resp.raise_for_status()
              payload = resp.json()
              if "error" in payload:
                raise RuntimeError(f"Fandom cargoquery error: {payload['error']}")
              batch = payload.get("cargoquery", [])
              if not batch:
                break
              all_rows.extend(batch)
              if len(batch) < limit:
                break
              offset += len(batch)
            return [row.get("title", {}).get("DateTimeUTC") for row in all_rows]

          def merge_cost(a: dict, b: dict) -> int:
            before = (a["end"] - a["start"] + 1) + (b["end"] - b["start"] + 1)
            after = max(a["end"], b["end"]) - min(a["start"], b["start"]) + 1
            width_increase = after - before
            impacted_days = len(set(a["days"]) | set(b["days"]))
            return width_increase * impacted_days

          def split_hour_clusters(hours: list[int], gap_threshold: int) -> list[list[int]]:
            if not hours:
              return []
            unique_sorted = sorted(set(hours))
            clusters = [[unique_sorted[0]]]
            for h in unique_sorted[1:]:
              if h - clusters[-1][-1] > gap_threshold:
                clusters.append([h])
              else:
                clusters[-1].append(h)
            return clusters

          def compute_dynamic_crons(session: requests.Session, tours: list[dict]) -> list[str]:
            now_utc = datetime.now(timezone.utc)
            week_start = (now_utc - timedelta(days=now_utc.weekday())).replace(hour=0, minute=0, second=0, microsecond=0)
            week_end = week_start + timedelta(days=6, hours=23, minutes=59, seconds=59)
            print(f"[Cron] 本周时间窗 (UTC): {week_start.strftime('%Y-%m-%d %H:%M:%S')} -> {week_end.strftime('%Y-%m-%d %H:%M:%S')}")
            print(f"[Cron] 赛事数量: {len(tours)}")

            weekday_hours = {d: [] for d in range(1, 8)}
            match_debug_rows = []
            for tour in tours:
              slug = tour.get("slug", "<unknown>")
              pages = tour.get("overview_page")
              if isinstance(pages, str):
                pages = [pages]
              if not pages:
                raise RuntimeError(f"overview_page missing: {tour.get('slug')}")
              print(f"[Cron] 抓取赛程: slug={slug}, pages={pages}")
              raw_times = fetch_matches_for_pages(session, pages, week_start, week_end)
              print(f"[Cron]   原始比赛条数: {len(raw_times)}")
              for item in raw_times:
                if not item:
                  continue
                dt = datetime.strptime(item, "%Y-%m-%d %H:%M:%S").replace(tzinfo=timezone.utc)
                weekday = dt.isoweekday()
                hour = dt.hour
                weekday_hours[weekday].append(hour)
                match_debug_rows.append((slug, dt.strftime("%Y-%m-%d %H:%M:%S"), weekday, hour))

            if not match_debug_rows:
              print("[Cron] 本周时间窗内无比赛，动态 CRON 已禁用")
              return []

            print("[Cron] 参与计算的比赛明细:")
            for slug, dt_str, weekday, hour in match_debug_rows:
              print(f"[Cron]   slug={slug}, dt_utc={dt_str}, weekday={weekday}, hour={hour}")
            windows = []
            for day in range(1, 8):
              hours = weekday_hours[day]
              if not hours:
                continue
              clusters = split_hour_clusters(hours, WINDOW_PADDING_HOURS + 1)
              print(f"[Cron] 星期{day}: 小时={sorted(set(hours))}, 分簇={clusters}")
              for cluster in clusters:
                start_hour = min(cluster)
                raw_end_hour = max(cluster) + WINDOW_PADDING_HOURS
                if raw_end_hour <= 23:
                  end_hour = raw_end_hour
                  if start_hour > end_hour:
                    raise RuntimeError(f"Invalid hour window for weekday {day}: {start_hour}-{end_hour}")
                  windows.append({"start": start_hour, "end": end_hour, "days": {day}})
                  print(f"[Cron] 星期{day}: 簇={cluster} -> 窗口={start_hour}-{end_hour}")
                else:
                  overflow_end = raw_end_hour - 24
                  if not (0 <= overflow_end <= 23):
                    raise RuntimeError(f"Invalid overflow hour for weekday {day}: {overflow_end}")
                  windows.append({"start": start_hour, "end": 23, "days": {day}})
                  spill_day = 1 if day == 7 else day + 1
                  windows.append({"start": 0, "end": overflow_end, "days": {spill_day}})
                  print(f"[Cron] 星期{day}: 簇={cluster} -> 跨天窗口={start_hour}-23 (星期{day}) + 0-{overflow_end} (星期{spill_day})")

            grouped = {}
            for w in windows:
              key = (w["start"], w["end"])
              grouped.setdefault(key, set()).update(w["days"])
            merged = [{"start": s, "end": e, "days": days} for (s, e), days in grouped.items()]
            print(f"[Cron] 首轮聚合后窗口数: {len(merged)}")

            while len(merged) > MAX_DYNAMIC_CRONS:
              best_i, best_j, best_cost = -1, -1, None
              for i in range(len(merged)):
                for j in range(i + 1, len(merged)):
                  cost = merge_cost(merged[i], merged[j])
                  if best_cost is None or cost < best_cost:
                    best_i, best_j, best_cost = i, j, cost
              if best_i < 0:
                raise RuntimeError("Window merge failed")
              a = merged[best_i]
              b = merged[best_j]
              combined = {"start": min(a["start"], b["start"]), "end": max(a["end"], b["end"]), "days": set(a["days"]) | set(b["days"])}
              print(f"[Cron] 合并窗口: {a['start']}-{a['end']}@{sorted(a['days'])} + {b['start']}-{b['end']}@{sorted(b['days'])} -> {combined['start']}-{combined['end']}@{sorted(combined['days'])} (增量小时={best_cost})")
              next_list = []
              for idx, w in enumerate(merged):
                if idx not in (best_i, best_j):
                  next_list.append(w)
              next_list.append(combined)
              merged = next_list

            merged.sort(key=lambda w: (w["start"], w["end"], min(w["days"])))
            crons = []
            for w in merged:
              cron_days = [ISO_DAY_NAMES[day] for day in sorted(w["days"])]
              day_field = ",".join(cron_days)
              crons.append(f"*/2 {w['start']}-{w['end']} * * {day_field}")
            print(f"[Cron] 最终动态 CRON 数量: {len(crons)}")
            for c in crons:
              print(f"[Cron] 动态 CRON: {c}")
            return crons

          def write_triggers_crons(path: str, crons: list[str]) -> None:
            with open(path, "r", encoding="utf-8") as f:
              text = f.read()

            new_block = "[triggers]\ncrons = [" + ", ".join(f"\"{c}\"" for c in crons) + "]\n"
            pattern = re.compile(r"(?ms)^\[triggers\]\n.*?(?=^\[|\Z)")
            if pattern.search(text):
              updated = pattern.sub(new_block + "\n", text, count=1)
            else:
              updated = text.rstrip() + "\n\n" + new_block

            with open(path, "w", encoding="utf-8", newline="\n") as f:
              f.write(updated)

          if __name__ == "__main__":
            fandom_user = os.environ.get("FANDOM_BOT_USERNAME", "").strip()
            fandom_pass = os.environ.get("FANDOM_BOT_PASSWORD", "").strip()
            if not fandom_user or not fandom_pass:
              raise RuntimeError("Missing required env: FANDOM_BOT_USERNAME/FANDOM_BOT_PASSWORD")

            with open(TOUR_PATH, "r", encoding="utf-8") as f:
              tours = json.load(f)
            if not isinstance(tours, list):
              raise RuntimeError("config/tour.json must be a list")

            fandom_session = fandom_login(fandom_user, fandom_pass)
            dynamic_crons = compute_dynamic_crons(fandom_session, tours)
            final_crons = [BASELINE_CRON]
            final_crons.extend(dynamic_crons)

            write_triggers_crons(WRANGLER_PATH, final_crons)
            print(f"[Cron] 最终 CRON 条数: {len(final_crons)} (1 条日切 + {len(dynamic_crons)} 条动态)")
            print(f"Updated wrangler triggers: {final_crons}")

            commit_msg = f"⏱️ Cron: {' || '.join(dynamic_crons)}" if dynamic_crons else "⏱️ Cron: disabled"
            with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"commit_msg={commit_msg}\n")

      - name: Commit and Push
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ steps.cron_update.outputs.commit_msg }}"
          file_pattern: "wrangler.toml"

      - name: Trigger Deploy
        if: steps.auto_commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/actions/workflows/deploy.yml/dispatches" \
            -d "{\"ref\":\"${GH_REF}\"}"
