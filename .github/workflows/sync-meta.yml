name: Sync Metadata (Teams & Leagues)

on:
  workflow_dispatch: # 允许你在 GitHub 网页端手动点击运行
  schedule:
    - cron: '0 0 * * 0' # 每周日 UTC 00:00 自动运行一次 (频率无需太高)

jobs:
  sync-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Map Data
        env:
          PYTHONUNBUFFERED: "1"
        shell: python
        run: |
          import requests
          import json
          import time

          # ==================== 工具函数：分页抓取 ====================
          def fetch_cargo_table(table, fields, limit=500):
              url = "https://lol.fandom.com/api.php"
              all_data = []
              offset = 0
              session = requests.Session()
              session.headers.update({"User-Agent": "LoLMetadataSync/1.0"})
              
              print(f"开始抓取表格: {table}...")
              
              while True:
                  params = {
                      "action": "cargoquery",
                      "format": "json",
                      "tables": table,
                      "fields": fields,
                      "limit": str(limit),
                      "offset": str(offset)
                  }
                  
                  try:
                      resp = session.get(url, params=params, timeout=20)
                      resp.raise_for_status()
                      data = resp.json().get("cargoquery", [])
                  except Exception as e:
                      print(f"网络请求失败 (offset={offset}): {e}")
                      break

                  if not data:
                      break
                  
                  # 提取 title 内的数据
                  clean_data = [item["title"] for item in data]
                  all_data.extend(clean_data)
                  print(f"已抓取 {table} 数据: {len(all_data)} 条")
                  
                  if len(data) < limit:
                      break
                      
                  offset += limit
                  time.sleep(1) # 礼貌延迟
                  
              return all_data

          # ==================== 1. 生成 Leagues 字典 ====================
          leagues_raw = fetch_cargo_table("Leagues", "League, League_Short=LeagueShort")
          league_map = {}
          for item in leagues_raw:
              league_full = item.get("League")
              league_short = item.get("LeagueShort")
              if league_full:
                  # 如果没有简写，用全称兜底
                  league_map[league_full] = league_short or league_full 

          with open("leagues.json", "w", encoding="utf-8") as f:
              json.dump(league_map, f, indent=2, ensure_ascii=False)
          print(f"成功生成 leagues.json，包含 {len(league_map)} 个联赛映射。")

          # ==================== 2. 生成 Teams 字典 ====================
          # Fandom 中队伍可能过万，只拉取有用的字段
          teams_raw = fetch_cargo_table("Teams", "FullName, Short")
          team_map = {}
          for item in teams_raw:
              team_full = item.get("FullName")
              team_short = item.get("Short")
              if team_full:
                  team_map[team_full] = team_short or team_full

          with open("teams.json", "w", encoding="utf-8") as f:
              json.dump(team_map, f, indent=2, ensure_ascii=False)
          print(f"成功生成 teams.json，包含 {len(team_map)} 个队伍映射。")

      - name: Commit and Push Metadata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🗂️ Sync metadata: leagues.json & teams.json"
          file_pattern: "*.json"
