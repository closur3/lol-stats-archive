name: "Tour: Discover Tournaments"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'

jobs:
  tour:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Discover Tournaments
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Tokyo
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        shell: python
        run: |
          import requests, json, re, time, os, sys
          from datetime import datetime, timedelta

          now = datetime.now()
          today_dt = now.date()
          TARGET_FILE = "config/tour.json"

          # ==================== 配置区 ====================
          PREHEAT_DAYS, EXPIRE_DAYS = 7, 1
          WHITELIST = []
          BLACKLIST = ["Opening"]

          NAME_MAPPING = {
              "Rounds 1-2": "Rounds 1-4",
              "Rounds 3-4": "Rounds 1-4",
          }

          CARGO_FIELDS = [
              "Name", "OverviewPage", "DateStart", "Date", "Region", "Year", "IsPlayoffs", "League"
          ]
          CARGO_WHERE = {
              "Year": [now.year],
              "TournamentLevel": "Primary",
              #"IsQualifier": "1",
              "Region": ["International", "China", "Korea"],
          }
          CARGO_WHERE_RAW = ["DateStart IS NOT NULL"]
          CARGO_ORDER_BY = "DateStart ASC"
          # ================================================

          # ── 颜色常量 ──────────────────────────────────────
          RESET, RED, GREEN, YELLOW, PURPLE, BLACK = (
              "\033[0m", "\033[91m", "\033[92m", "\033[93m", "\033[95m", "\033[30m"
          )

          # ==================== 工具函数 ====================

          def fmt_league(s: str) -> str:
              """将空字符串/None 统一展示为 'null'。"""
              return s or "null"

          def parse_date(s: str):
              """将 'YYYY-MM-DD' 字符串解析为 date 对象。"""
              return datetime.strptime(s, "%Y-%m-%d").date()

          def load_json(path: str, default=None):
              """安全读取 JSON 文件，失败时返回 default。"""
              if not os.path.exists(path):
                  return default
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return json.load(f)
              except Exception as e:
                  log("WARN", f"读取 {path} 异常: {e}", YELLOW)
                  return default

          def add_extra_ov(ev: dict, ov: str) -> None:
              """向赛事字典的 extra_ovs 列表去重追加 ov。"""
              if ov not in ev.setdefault("extra_ovs", []):
                  ev["extra_ovs"].append(ov)

          def log(level: str, msg: str, color=BLACK) -> None:
              print(f"{color}[{level}] {msg}{RESET}", flush=True)

          def log_sep() -> None:
              log("INFO", "=" * 100)

          def log_div() -> None:
              log("INFO", "-" * 100)

          def log_block(reason: str, name: str, league: str) -> None:
              """统一格式的全局拦截日志。"""
              log("INFO", f"全局拦截 | {reason} | 赛事: {name} | 联赛: {fmt_league(league)}", BLACK)

          def build_where(where_dict: dict, raw=None) -> str:
              parts = []
              for k, v in where_dict.items():
                  if isinstance(v, list):
                      if len(v) == 1:
                          parts.append(f"{k} = '{v[0]}'")
                      else:
                          values = ", ".join(f"'{x}'" for x in v)
                          parts.append(f"{k} IN ({values})")
                  else:
                      parts.append(f"{k} = '{v}'")
              if raw:
                  parts.extend(raw)
              return " AND ".join(parts)

          def apply_name_mapping(name: str):
              """模糊替换：name 中包含 key 片段则替换为 value，未命中返回 None。"""
              for k, v in NAME_MAPPING.items():
                  if k.lower() in name.lower():
                      return re.compile(re.escape(k), re.IGNORECASE).sub(v, name)
              return None

          def make_session(url: str, bot_user: str, bot_pass: str) -> requests.Session:
              """创建并登录 Fandom API Session，登录失败时退化为匿名模式。"""
              session = requests.Session()
              session.headers.update({"User-Agent": "LoLStatsWorker/2026 (User:HsuX)"})

              if not (bot_user and bot_pass):
                  log("WARN", "未检测到凭证(FANDOM_BOT_USERNAME/PASSWORD)，以匿名身份抓取", YELLOW)
                  return session

              try:
                  token_res = session.get(url, params={
                      "action": "query", "meta": "tokens", "type": "login", "format": "json"
                  }, timeout=15).json()
                  login_token = token_res.get("query", {}).get("tokens", {}).get("logintoken")

                  if login_token:
                      login_res = session.post(url, data={
                          "action": "login", "lgname": bot_user, "lgpassword": bot_pass,
                          "lgtoken": login_token, "format": "json"
                      }, timeout=15).json()

                      if login_res.get("login", {}).get("result") == "Success":
                          log("INFO", f"Fandom API 身份认证成功 | 用户: {bot_user}", GREEN)
                      else:
                          log("WARN", f"身份认证失败，将以匿名身份继续 | 详情: {login_res}", YELLOW)
              except Exception as e:
                  log("WARN", f"登录环节发生网络或解析异常: {e}", YELLOW)

              return session

          def fetch_cargo(session: requests.Session, url: str, base_params: dict) -> list:
              """执行分页抓取，返回所有 cargoquery 条目；首屏失败时退出进程。"""
              all_data, offset, limit, MAX_ATTEMPTS = [], 0, 100, 5
              log("INFO", "开始执行分页抓取机制...")

              while True:
                  params = {**base_params, "limit": str(limit), "offset": str(offset)}
                  page_data = []

                  for attempt in range(1, MAX_ATTEMPTS + 1):
                      try:
                          resp = session.get(url, params=params, timeout=30)
                          resp.raise_for_status()
                          resp_json = resp.json()
                          if "error" in resp_json:
                              log("WARN", f"API受限 | 重试 {attempt}/{MAX_ATTEMPTS} | 详情: {resp_json['error']}", YELLOW)
                              time.sleep(15 * attempt)
                              continue
                          page_data = resp_json.get("cargoquery", [])
                          break
                      except Exception as e:
                          log("WARN", f"网络异常 | 重试 {attempt}/{MAX_ATTEMPTS} | 详情: {e}", YELLOW)
                          time.sleep(15 * attempt)

                  if not page_data:
                      if offset == 0:
                          log("WARN", "任务中止 | 首屏即未获取到任何数据。", RED)
                          sys.exit(1)
                      break

                  all_data.extend(page_data)
                  log("INFO", f"获取成功 | 当前 Offset: {offset:<4} | 取得数据: {len(page_data)} 条 | 累计: {len(all_data)} 条")

                  if len(page_data) < limit:
                      break

                  offset += limit
                  time.sleep(1)

              return all_data

          # ==================== 主流程 ====================

          def run_sniff():
              old_slugs = {item.get("slug") for item in (load_json(TARGET_FILE, []) or []) if item.get("slug")}

              log_sep()
              log("INFO", f"系统初始化完成 (日期: {today_dt}) | 开始抓取赛事目录")
              log_sep()

              LEAGUE_MAPPING = load_json("config/leagues.json", {})

              ALLOWED_REGIONS = set()
              if "Region" in CARGO_WHERE and CARGO_WHERE["Region"] is not None:
                  raw = CARGO_WHERE["Region"]
                  ALLOWED_REGIONS = {str(r) for r in (raw if isinstance(raw, list) else [raw])}

              url = "https://lol.fandom.com/api.php"
              session = make_session(url, os.environ.get("FANDOM_BOT_USERNAME"), os.environ.get("FANDOM_BOT_PASSWORD"))

              cargo_base = {
                  "action": "cargoquery", "format": "json", "tables": "Tournaments",
                  "fields": ", ".join(CARGO_FIELDS),
                  "where": build_where(CARGO_WHERE, CARGO_WHERE_RAW),
                  "order_by": CARGO_ORDER_BY,
              }
              all_data = fetch_cargo(session, url, cargo_base)

              main_events, playoff_events = {}, []
              log("INFO", f"数据同步成功 | 原始数据共计 {len(all_data)} 条")
              log_div()

              for item in all_data:
                  t = item["title"]
                  name = t.get("Name", "")
                  ov = t.get("OverviewPage", "")
                  region = t.get("Region", "")
                  y = t.get("Year", "")
                  league_full = t.get("League", "")

                  if t.get("IsQualifier") == "1":
                      log_block("判定为预选赛 (Qualifier)", name, league_full)
                      continue
                  hit_black = next((k for k in BLACKLIST if k.lower() in name.lower()), None)
                  if hit_black:
                      log_block(f"命中黑名单关键词 ({hit_black})", name, league_full)
                      continue
                  hit_white = next((k for k in WHITELIST if k.upper() in ov.upper()), None)
                  if ALLOWED_REGIONS and region not in ALLOWED_REGIONS and not hit_white:
                      log_block(f"Region ({region}) 不在目标列表且未命中白名单", name, league_full)
                      continue

                  try:
                      s_dt = parse_date(t["DateStart"])
                      e_dt = parse_date(t.get("Date") or t["DateStart"])
                  except Exception as e:
                      log("WARN", f"日期异常 | 跳过赛事 | 赛事: {name} | 报错: {e}", YELLOW)
                      continue

                  mapped_name = apply_name_mapping(name)
                  if mapped_name:
                      log("INFO", f"名字聚合 | 模糊替换命中 | '{name}' → '{mapped_name}' | OVP: {ov}", PURPLE)
                      name = mapped_name

                  ev = {"ov": ov, "year": y, "name": name, "region": region, "start": s_dt, "end": e_dt, "league_full": league_full}

                  if t.get("IsPlayoffs") == "1" and region != "International":
                      log("INFO", f"初步准入 | 赛事已进入季后赛匹配池 | 赛事: {name} | 联赛: {fmt_league(league_full)}", PURPLE)
                      playoff_events.append(ev)
                  else:
                      key = f"INTL_{name}" if region == "International" else (f"{name}_{y}" if mapped_name else f"{ov}_{y}")
                      if key not in main_events:
                          log("INFO", f"初步准入 | 赛事已加入主赛聚合列表 | 赛事: {name} | 联赛: {fmt_league(league_full)}", PURPLE)
                          main_events[key] = {**ev, "extra_ovs": [ov]}
                      else:
                          log("INFO", f"名字聚合 | 合并入已有抽屉 | 追加 OVP: {ov} | Key: {key}", PURPLE)
                          main_events[key]["start"] = min(main_events[key]["start"], s_dt)
                          main_events[key]["end"]   = max(main_events[key]["end"],   e_dt)
                          add_extra_ov(main_events[key], ov)

              log_div()
              log("INFO", "启动季后赛数据关联匹配模块...")

              for p in playoff_events:
                  m_key = next((
                      k for k, m in main_events.items()
                      if m["region"] != "International"
                      and m["year"] == p["year"]
                      and (m["name"] in p["name"] or p["ov"].startswith(m["ov"]))
                  ), None)

                  if m_key:
                      old_end = main_events[m_key]["end"]
                      new_end = max(old_end, p["end"])
                      log("INFO", f"赛程合并 | 主赛: {main_events[m_key]['name']} | 关联季后赛: {p['name']} | 结束日期: {old_end} -> {new_end}")
                      main_events[m_key]["end"] = new_end
                      add_extra_ov(main_events[m_key], p["ov"])
                  else:
                      log("WARN", f"独立保留 | 未发现关联主赛的季后赛 | 赛事: {p['name']} | 联赛: {fmt_league(p.get('league_full', ''))}", PURPLE)
                      main_events[f"{p['ov']}_{p['year']}_PO"] = p

              log_div()
              log("INFO", "启动生命周期终审模块...")

              final_output = []
              for v in main_events.values():
                  original_league = v.get("league_full", "")

                  if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)):
                      diff_days = (v["start"] - today_dt).days
                      log("INFO", f"周期拦截 | 距离开赛 {diff_days:>3} 天 (阈值 {PREHEAT_DAYS} 天) | 赛事: {v['name']} | 联赛: {fmt_league(original_league)}", YELLOW)
                      continue
                  if today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      diff_days = (today_dt - v["end"]).days
                      log("INFO", f"周期拦截 | 已经结束 {diff_days:>3} 天 (阈值 {EXPIRE_DAYS} 天) | 赛事: {v['name']} | 联赛: {fmt_league(original_league)}", YELLOW)
                      continue
                  if v["end"] < today_dt <= (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      log("INFO", f"周期放行 | 赛事已结束但仍在宽限期内 | 赛事: {v['name']} | 联赛: {fmt_league(original_league)}")

                  league_short = next(
                      (str(map_val) for k, map_val in LEAGUE_MAPPING.items() if k in original_league),
                      original_league or v["name"]
                  )

                  lp_name = v["name"]
                  log("INFO", f"确认准入 | 赛事: {lp_name} | 联赛: {fmt_league(original_league)} -> {league_short}", GREEN)

                  final_output.append({
                      "slug": lp_name.lower().replace(" ", "-"),
                      "name": lp_name,
                      "league": league_short,
                      "overview_page": v.get("extra_ovs", [v["ov"]]),
                      "start_date": str(v["start"]),
                      "end_date": str(v["end"]),
                  })

              # 合并本地缓存（新数据优先）
              base_dict = {}
              for item in (load_json(TARGET_FILE, []) or []):
                  try:
                      if today_dt <= (parse_date(item["end_date"]) + timedelta(days=EXPIRE_DAYS)):
                          base_dict[item["slug"]] = item
                  except Exception:
                      pass

              merged = {**base_dict, **{item["slug"]: item for item in final_output}}

              def sort_key(x):
                  start_date = x.get("start_date", "")
                  end_date = x.get("end_date", "")
                  slug = x.get("slug", "")

                  # 主要按 start_date 倒序
                  # 次要按 end_date 倒序
                  # 第三按 slug 字母顺序（确保稳定性）
                  return (start_date, end_date, slug)

              unique_res = sorted(merged.values(), key=sort_key, reverse=True)

              with open(TARGET_FILE, "w", encoding="utf-8") as f:
                  json.dump(unique_res, f, indent=4, ensure_ascii=False)

              new_s = {item["slug"] for item in unique_res}
              diff = [f"+ {s}" for s in sorted(new_s - old_slugs)] + [f"- {s}" for s in sorted(old_slugs - new_s)]

              if len(diff) > 5:
                  commit_msg = f"🎯 Tour: +{len(new_s - old_slugs)}, -{len(old_slugs - new_s)}"
              elif diff:
                  commit_msg = f"🎯 Tour: {' | '.join(diff)}"
              else:
                  commit_msg = "🎯 Tour: no changes"

              if "GITHUB_OUTPUT" in os.environ:
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write(f"commit_msg={commit_msg}\n")

          if __name__ == "__main__":
              run_sniff()

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          file_pattern: "/config/tour.json"
