name: Auto Discover Tournaments (Enterprise Logging)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Extract, Validate and Aggregate Data
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Shanghai
        run: |
          import requests
          import json
          import re
          import time
          import os
          from datetime import datetime, timedelta
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          now = datetime.now()
          today_dt = now.date()
          TEST_FILE = "tournaments-test.json"

          PREHEAT_DAYS = 7
          EXPIRE_DAYS  = 1
          WHITELIST    = ["LPL", "LCK"]
          BLACKLIST    = ["Opening", "Promotion", "KeSPA", "Showmatch", "LCK CL", "LPLOL", "Secondary", "Qualifier", "Academy", "Division"]

          # ── ANSI 颜色 & 日志工具 ──────────────────────────────────────────
          RESET, BLACK, YELLOW, RED, PURPLE = "\033[0m", "\033[30m", "\033[93m", "\033[91m", "\033[95m"
          def log(level, msg):
              colors = {"INFO": BLACK, "WARN": YELLOW, "ERROR": RED, "DEBUG": PURPLE}
              print(f"{colors.get(level, RESET)}[{level:<5}]  {msg}{RESET}", flush=True)

          def get_robust_session():
              session = requests.Session()
              # 网络层指数退避：1s, 2s, 4s, 8s, 16s
              retry_strategy = Retry(total=5, backoff_factor=2, status_forcelist=[429, 500, 502, 503, 504], allowed_methods=["GET"])
              session.mount("https://", HTTPAdapter(max_retries=retry_strategy))
              return session

          def run_sniff():
              old_slugs = set()
              if os.path.exists(TEST_FILE):
                  try:
                      with open(TEST_FILE, "r", encoding="utf-8") as f:
                          old_data = json.load(f)
                          old_slugs = {item.get("slug") for item in old_data if item.get("slug")}
                  except: pass

              url = "https://lol.fandom.com/api.php"
              where_sql = f"(Year = '{now.year}' OR Year = '{now.year + 1}') AND DateStart IS NOT NULL AND TournamentLevel = 'Primary'"
              params = {"action": "cargoquery", "format": "json", "tables": "Tournaments", "fields": "Name, OverviewPage, DateStart, Date, Region, Year, IsQualifier, IsPlayoffs", "where": where_sql, "order_by": "DateStart ASC", "limit": "400"}
              headers = {"User-Agent": "LoLStatsEnterprise/36.0"}

              log("INFO", "=" * 74)
              log("INFO", f"系统初始化完成 (日期: {today_dt})，开始执行赛事自动化工作流。")
              log("INFO", "=" * 74)

              session = get_robust_session()
              data = []
              
              MAX_ATTEMPTS = 5
              for attempt in range(1, MAX_ATTEMPTS + 1):
                  try:
                      resp = session.get(url, params=params, headers=headers, timeout=30)
                      resp.raise_for_status()
                      resp_json = resp.json()

                      if "error" in resp_json:
                          err_info = resp_json["error"]
                          log("WARN", f"API 应用层异常 (重试 {attempt}/{MAX_ATTEMPTS}) | 详情：{err_info}")
                          # 👈 应用层退避：15s, 30s, 45s, 60s, 75s
                          if "ratelimit" in str(err_info).lower() or "limit" in str(err_info).lower():
                              sleep_time = 15 * attempt
                              log("WARN", f"触发速率限制 (Rate Limit) | 系统挂起等待 {sleep_time} 秒...")
                              time.sleep(sleep_time)
                              continue
                          else: break

                      data = resp_json.get("cargoquery", [])
                      if data: break
                      else:
                          log("WARN", "API 响应数据集为空，可能未匹配到符合条件的赛事。")
                          break

                  except requests.exceptions.RequestException as e:
                      # 👈 网络波动退避：5s, 10s, 15s, 20s, 25s
                      wait_sec = 5 * attempt
                      log("ERROR", f"网络通信故障 (重试 {attempt}/{MAX_ATTEMPTS}) | 等待 {wait_sec}s | 详情：{e}")
                      time.sleep(wait_sec)

              if not data:
                  log("ERROR", "致命错误：数据抓取异常中止。")
                  return

              main_events = {}
              playoff_events = []

              for item in data:
                  t = item["title"]
                  name, ov, region, y = t.get("Name", ""), t.get("OverviewPage", ""), t.get("Region", ""), t.get("Year", "")
                  is_playoffs, is_qualifier = t.get("IsPlayoffs"), t.get("IsQualifier")
                  if is_qualifier == "1" or any(k.lower() in name.lower() for k in BLACKLIST): continue
                  is_intl = (region == 'International')
                  if not (is_intl or any(k.upper() in ov.upper() for k in WHITELIST)): continue
                  try:
                      s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                      e_dt = datetime.strptime(t["Date"], '%Y-%m-%d').date() if t.get("Date") else s_dt
                  except: continue

                  event = {"ov": ov, "year": y, "name": name, "is_intl": is_intl, "start": s_dt, "end": e_dt}
                  if is_playoffs == "1" and not is_intl:
                      playoff_events.append(event)
                  else:
                      key = f"INTL_{name}" if is_intl else f"{ov}_{y}"
                      if key not in main_events: main_events[key] = event
                      else:
                          main_events[key]["start"] = min(main_events[key]["start"], s_dt)
                          main_events[key]["end"] = max(main_events[key]["end"], e_dt)

              log("INFO", "执行季后赛名称匹配与赛程延展模块...")
              for p in playoff_events:
                  matched_key = None
                  for mk, m in main_events.items():
                      if m["is_intl"] or m["year"] != p["year"]: continue
                      # 严格执行: isplayoffs=0 的 LIKE 匹配 isplayoffs=1
                      if m["name"] in p["name"]:
                          matched_key = mk
                          break
                  if matched_key:
                      main_events[matched_key]["end"] = max(main_events[matched_key]["end"], p["end"])
                      log("INFO", f"规则匹配延期 | 主赛：{main_events[matched_key]['name']} <- 关联季后赛：{p['name']}")
                  else:
                      log("WARN", f"赛程分离 [无关联主赛] | 季后赛：{p['name']}")
                      main_events[f"{p['ov']}_{p['year']}_PO"] = p

              final_output = []
              for v in main_events.values():
                  if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)) or today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      continue
                  if v["end"] < today_dt <= (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      log("INFO", f"周期放行 [缓冲期保留] | 赛事：{v['name']}")

                  if v["is_intl"]:
                      slug_name = v["name"].lower().replace(str(v["year"]), "").replace("mid-season invitational", "msi").replace("world championship", "worlds").replace("esports world cup", "ewc").strip()
                      slug = f"{v['year']}-{re.sub(r'[^a-z0-9]+', '-', slug_name).strip('-')}"
                  else:
                      p_list = v["ov"].split('/')
                      slug = f"{v['year']}-{p_list[0].lower()}-{re.sub(r'[^a-z0-9]+', '-', p_list[-1].lower()).strip('-')}"
                  final_output.append({"slug": slug, "overview_page": v["ov"], "start_date": str(v["start"]), "end_date": str(v["end"])})

              unique_res = sorted([dict(t) for t in {tuple(d.items()) for d in final_output}], key=lambda x: x['slug'])
              with open(TEST_FILE, "w", encoding="utf-8") as f:
                  json.dump(unique_res, f, indent=4, ensure_ascii=False)

              new_slugs = {item["slug"] for item in unique_res}
              added, removed = new_slugs - old_slugs, old_slugs - new_slugs
              msg = []
              if added: msg.append(f"➕ {len(added)} added: {', '.join(added)}")
              if removed: msg.append(f"➖ {len(removed)} removed: {', '.join(removed)}")
              commit_msg = f"📊 Data Sync: {' | '.join(msg)}" if msg else f"🔄 Data Sync: {len(unique_res)} tournaments updated"
              
              if "GITHUB_OUTPUT" in os.environ:
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write(f"commit_msg={commit_msg}\n")

          if __name__ == "__main__":
              run_sniff()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          file_pattern: 'tournaments-test.json'
