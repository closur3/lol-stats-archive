name: Auto Discover Tournaments (Semantic Final)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Aggregated Sniff
        run: |
          import requests
          import json
          import re
          import time
          import random
          from datetime import datetime, timedelta

          now = datetime.now()
          THIS_YEAR, NEXT_YEAR = now.year, now.year + 1
          today_dt = now.date()
          TEST_FILE = "tournaments-test.json"

          PREHEAT_DAYS = 14 
          EXPIRE_DAYS = 1   

          # 1. 严格过滤配置
          BLACKLIST = ["Opening", "Promotion", "KeSPA", "Showmatch", "LCK CL", "LPLOL", "Secondary"]
          WHITELIST = ["LPL", "LCK"]

          def get_clean_root(ov, level):
              if level == 'International': return ov
              # 2. 语义锚点：只要路径包含这些词，就在该词处截断
              # 解决 LPL/Split 1/Playoffs -> LPL/Split 1
              anchors = [r'Split \d+', r'Cup', r'Versus', r'Lock-In']
              for pattern in anchors:
                  match = re.search(f'(.+/{pattern})', ov)
                  if match: return match.group(1)
              # 3. 兜底：如果路径太深且没锚点，保留前三段
              parts = ov.split('/')
              return "/".join(parts[:3]) if len(parts) > 3 else ov

          def run_sniff():
              url = "https://lol.fandom.com/api.php"
              # 扩大 SQL 搜索范围，确保国际赛不漏
              where_sql = f"(Year = '{THIS_YEAR}' OR Year = '{NEXT_YEAR}') AND DateStart IS NOT NULL"
              params = {
                  "action": "cargoquery", "format": "json", "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel, Year",
                  "where": where_sql, "order_by": "DateStart ASC", "limit": "350"
              }
              headers = {"User-Agent": f"LoLStatsFinal/14.0 (Chrome/{random.randint(110,125)})"}

              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=25)
                  data = resp.json().get("cargoquery", [])
                  if not data: return

                  raw_groups = {}
                  for item in data:
                      t = item["title"]
                      name, ov, level, y = t["Name"], t["OverviewPage"], t["TournamentLevel"] or "N/A", t["Year"]
                      
                      # --- 严格准入检查 ---
                      if any(k.lower() in name.lower() or k.lower() in ov.lower() for k in BLACKLIST): continue
                      
                      # 准入逻辑：必须是 (国际赛) OR (白名单赛区)
                      is_intl = (level == 'International')
                      is_white = any(k.lower() in name.lower() or k.lower() in ov.lower() for k in WHITELIST)
                      
                      if not (is_intl or is_white): continue

                      # --- 路径归一化 ---
                      clean_ov = get_clean_root(ov, level)
                      group_key = f"INTL_{name}" if is_intl else f"{clean_ov}_{y}"

                      try:
                          s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                          e_dt = datetime.strptime(t["Date"], '%Y-%m-%d').date() if t.get("Date") else s_dt
                      except: continue

                      if group_key not in raw_groups:
                          raw_groups[group_key] = {
                              "ov": clean_ov, "year": y, "name": name, "is_intl": is_intl,
                              "start": s_dt, "end": e_dt
                          }
                      else:
                          # 时间聚合：确保主路径生命周期覆盖所有子赛段
                          raw_groups[group_key]["start"] = min(raw_groups[group_key]["start"], s_dt)
                          raw_groups[group_key]["end"] = max(raw_groups[group_key]["end"], e_dt)

                  # --- 生命周期判定与 Slug 生成 ---
                  final_output = []
                  for gk, v in raw_groups.items():
                      if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)): continue
                      if today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)): continue

                      y, league = v["year"], v["ov"].split('/')[0].lower()
                      
                      if v["is_intl"]:
                          # 国际赛 Slug: 2026-msi
                          s_name = v["name"].lower().replace(str(y), "").replace("mid-season invitational", "msi").replace("world championship", "worlds").strip()
                          slug = f"{y}-{re.sub(r'[^a-z0-9]+', '-', s_name).strip('-')}"
                      else:
                          # 区域赛 Slug: 2026-lpl-split-1
                          # 从路径尝试提取后缀 (split-1/cup/versus)
                          suffix = ""
                          for key in ["split 1", "split 2", "split 3", "cup", "versus", "lock-in"]:
                              if key in v["ov"].lower():
                                  suffix = f"-{key.replace(' ', '-')}"
                                  break
                          slug = f"{y}-{league}{suffix}"

                      final_output.append({
                          "slug": slug,
                          "overview_page": v["ov"],
                          "start_date": v["start"].strftime('%Y-%m-%d'),
                          "end_date": v["end"].strftime('%Y-%m-%d')
                      })

                  # 排序去重
                  unique_res = sorted([dict(t) for t in {tuple(d.items()) for d in final_output}], key=lambda x: x['slug'])
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(unique_res, f, indent=4, ensure_ascii=False)
                  
                  print(f"🎉 修正同步完成。当前包含 {len(unique_res)} 条核心配置。")

              except Exception as e:
                  print(f"💥 异常: {e}")

          if __name__ == "__main__":
              run_sniff()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Fix: Strict Whitelist & Anchor Truncation"
          file_pattern: 'tournaments-test.json'
