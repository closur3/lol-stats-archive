name: Auto Discover Tournaments

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *' 

jobs:
  auto-tour:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 👇 1. 在这里全局定义文件名，以后只需修改这里
    env:
      TARGET_FILENAME: 'tournaments.json'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Tournament Data
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Korea
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        shell: python
        run: |
          import requests, json, re, time, os, sys
          from datetime import datetime, timedelta

          now = datetime.now()
          today_dt = now.date()
          
          # 👇 2. Python 脚本直接读取全局环境变量
          TARGET_FILE = os.environ.get("TARGET_FILENAME")
          
          # 配置区
          PREHEAT_DAYS, EXPIRE_DAYS = 7, 1
          WHITELIST = ["LPL", "LCK"]
          BLACKLIST = ["Opening"]
          
          # Slug 缩写映射表
          SLUG_REPLACEMENTS = {
              "first stand": "fst",
              "mid-season invitational": "msi",
              "world championship": "worlds",
              "esports world cup": "ewc"
          }

          RESET, RED, GREEN, YELLOW, PURPLE, BLACK = "\033[0m", "\033[91m", "\033[92m", "\033[93m", "\033[95m", "\033[30m"

          def wlen(s):
              return sum(2 if '\u1100' <= c <= '\u9fff' or '\uf900' <= c <= '\uffef' else 1 for c in s)

          def wfill(s, width):
              return s + " " * max(0, width - wlen(s))

          def log(level, msg, color=BLACK):
              print(f"{color}[{level}] {msg}{RESET}", flush=True)

          W3 = 26

          def run_sniff():
              old_slugs = set()
              if os.path.exists(TARGET_FILE):
                  try:
                      with open(TARGET_FILE, "r", encoding="utf-8") as f:
                          old_data = json.load(f)
                          old_slugs = {item.get("slug") for item in old_data if item.get("slug")}
                  except: pass

              log("INFO", "=" * 85)
              log("INFO", f"系统初始化完成 (日期: {today_dt}) | 开始抓取赛事目录")
              log("INFO", "=" * 85)

              url = "https://lol.fandom.com/api.php"
              
              session = requests.Session()
              session.headers.update({"User-Agent": "LoLStatsWorker/2026 (User:HsuX)"})

              bot_user = os.environ.get("FANDOM_BOT_USERNAME")
              bot_pass = os.environ.get("FANDOM_BOT_PASSWORD")
              
              if bot_user and bot_pass:
                  try:
                      token_res = session.get(url, params={
                          "action": "query", "meta": "tokens", "type": "login", "format": "json"
                      }, timeout=15).json()
                      login_token = token_res.get("query", {}).get("tokens", {}).get("logintoken")
                      
                      if login_token:
                          login_res = session.post(url, data={
                              "action": "login",
                              "lgname": bot_user,
                              "lgpassword": bot_pass,
                              "lgtoken": login_token,
                              "format": "json"
                          }, timeout=15).json()
                          
                          if login_res.get("login", {}).get("result") == "Success":
                              log("INFO", f"Fandom API 身份认证成功 | 用户: {bot_user}", GREEN)
                          else:
                              log("WARN", f"身份认证失败，将以匿名身份继续 | 详情: {login_res}", YELLOW)
                  except Exception as e:
                      log("WARN", f"登录环节发生网络或解析异常: {e}", YELLOW)
              else:
                  log("WARN", "未检测到凭证(FANDOM_BOT_USERNAME/PASSWORD)，以匿名身份抓取", YELLOW)

              all_data = []
              offset = 0
              limit = 100
              MAX_ATTEMPTS = 5
              
              log("INFO", "开始执行分页抓取机制...")
              
              while True:
                  params = {
                      "action": "cargoquery", "format": "json", "tables": "Tournaments",
                      "fields": "Name, OverviewPage, DateStart, Date, Region, Year, IsQualifier, IsPlayoffs",
                      "where": f"(Year = '{now.year}' OR Year = '{now.year + 1}') AND DateStart IS NOT NULL AND TournamentLevel = 'Primary'",
                      "order_by": "DateStart ASC", "limit": str(limit), "offset": str(offset)
                  }
                  
                  page_data = []
                  for attempt in range(1, MAX_ATTEMPTS + 1):
                      try:
                          resp = session.get(url, params=params, timeout=30)
                          resp.raise_for_status()
                          resp_json = resp.json()
                          if "error" in resp_json:
                              log("WARN", f"API受限 | 重试 {attempt}/{MAX_ATTEMPTS} | 详情: {resp_json['error']}", YELLOW)
                              time.sleep(15 * attempt); continue
                          page_data = resp_json.get("cargoquery", [])
                          break
                      except Exception as e:
                          st = 15 * attempt
                          log("WARN", f"网络异常 | 重试 {attempt}/{MAX_ATTEMPTS} | 详情: {e}", YELLOW)
                          time.sleep(st)

                  if not page_data and offset == 0:
                      log("WARN", "任务中止 | 首屏即未获取到任何数据。", RED)
                      sys.exit(1)
                  
                  if not page_data:
                      break
                      
                  all_data.extend(page_data)
                  log("INFO", f"获取成功 | 当前 Offset: {offset:<4} | 取得数据: {len(page_data)} 条 | 累计: {len(all_data)} 条")
                  
                  if len(page_data) < limit:
                      break
                  
                  offset += limit
                  time.sleep(1)

              main_events, playoff_events = {}, []
              log("INFO", f"数据同步成功 | 原始数据共计 {len(all_data)} 条")
              log("INFO", "-" * 85)

              for item in all_data:
                  t = item["title"]
                  name, ov, region, y = t.get("Name", ""), t.get("OverviewPage", ""), t.get("Region", ""), t.get("Year", "")
                  if t.get("IsQualifier") == "1":
                      log("INFO", f"全局拦截 | 业务过滤 | {wfill('判定为预选赛 (Qualifier)', W3)} | 赛事: {name}", BLACK)
                      continue
                  hit_black = next((k for k in BLACKLIST if k.lower() in name.lower()), None)
                  if hit_black:
                      log("INFO", f"全局拦截 | 业务过滤 | {wfill(f'命中黑名单关键词 ({hit_black})', W3)} | 赛事: {name}", BLACK)
                      continue
                  is_intl = (region == 'International')
                  hit_white = next((k for k in WHITELIST if k.upper() in ov.upper()), None)
                  if not (is_intl or hit_white):
                      log("INFO", f"全局拦截 | 业务过滤 | {wfill('非国际赛且未命中白名单区域', W3)} | 赛事: {name}", BLACK)
                      continue

                  try:
                      s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                      e_dt = datetime.strptime(t.get("Date") or t["DateStart"], '%Y-%m-%d').date()
                  except: continue

                  ev = {"ov": ov, "year": y, "name": name, "is_intl": is_intl, "start": s_dt, "end": e_dt}
                  if t.get("IsPlayoffs") == "1" and not is_intl:
                      log("INFO", f"初步准入 | 校验通过 | {wfill('赛事已进入季后赛待匹配池', W3)} | 赛事: {name}", PURPLE)
                      playoff_events.append(ev)
                  else:
                      key = f"INTL_{name}" if is_intl else f"{ov}_{y}"
                      if key not in main_events:
                          log("INFO", f"初步准入 | 校验通过 | {wfill('赛事已加入主赛聚合列表', W3)} | 赛事: {name}", PURPLE)
                          main_events[key] = ev
                      else:
                          main_events[key]["start"] = min(main_events[key]["start"], s_dt)
                          main_events[key]["end"] = max(main_events[key]["end"], e_dt)

              log("INFO", "-" * 85)
              log("INFO", "启动季后赛数据关联匹配模块...")
              for p in playoff_events:
                  m_key = next((k for k, m in main_events.items() if not m["is_intl"] and m["year"] == p["year"] and m["name"] in p["name"]), None)
                  if m_key:
                      log("INFO", f"赛程合并 | 规则延期 | 主赛: {main_events[m_key]['name']:<25} | 关联季后赛: {p['name']}")
                      main_events[m_key]["end"] = max(main_events[m_key]["end"], p["end"])
                  else:
                      log("WARN", f"关联失败 | 独立保留 | {wfill('未发现关联主赛的季后赛', W3)} | 赛事: {p['name']}", YELLOW)
                      main_events[f"{p['ov']}_{p['year']}_PO"] = p

              log("INFO", "-" * 85)
              log("INFO", "启动生命周期终审模块...")
              final_output = []
              for v in main_events.values():
                  if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)):
                      diff_days = (v["start"] - today_dt).days
                      log("INFO", f"周期拦截 | 尚未预热 | {wfill(f'距开赛 {diff_days:>3} 天 (阈值 {PREHEAT_DAYS} 天)', W3)} | 赛事: {v['name']}", YELLOW)
                      continue
                  if today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      diff_days = (today_dt - v["end"]).days
                      log("INFO", f"周期拦截 | 赛事过期 | {wfill(f'已结束 {diff_days:>3} 天 (阈值 {EXPIRE_DAYS} 天)', W3)} | 赛事: {v['name']}", YELLOW)
                      continue
                  
                  if v["end"] < today_dt <= (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      log("INFO", f"周期放行 | 宽限期内 | {wfill('赛事已结束但仍在宽限期内', W3)} | 赛事: {v['name']}")

                  if v["is_intl"]:
                      sn = v["name"].lower().replace(str(v["year"]), "").strip()
                      for full, short in SLUG_REPLACEMENTS.items():
                          sn = sn.replace(full, short)
                      slug = f"{v['year']}-{re.sub(r'[^a-z0-9]+', '-', sn).strip('-')}"
                  else:
                      pl = v["ov"].split('/')
                      slug = f"{v['year']}-{pl[0].lower()}-{re.sub(r'[^a-z0-9]+', '-', pl[-1].lower()).strip('-')}"
                  
                  log("INFO", f"确认准入 | 数据落库 | {wfill(f'Slug: {slug}', W3+14)} | 赛事: {v['name']}", GREEN)
                  
                  final_output.append({
                      "slug": slug, 
                      "overview_page": [v["ov"]], 
                      "start_date": str(v["start"]), 
                      "end_date": str(v["end"])
                  })

              unique_dict = {item["slug"]: item for item in final_output}
              unique_res = sorted(unique_dict.values(), key=lambda x: x['slug'])
              with open(TARGET_FILE, "w", encoding="utf-8") as f:
                  json.dump(unique_res, f, indent=4, ensure_ascii=False)

              new_s = {item["slug"] for item in unique_res}
              diff = [f"➕ {s}" for s in sorted(new_s - old_slugs)] + [f"➖ {s}" for s in sorted(old_slugs - new_s)]
              commit_msg = f"📊 Data Sync: {' | '.join(diff)}" if diff else "🔄 Data Sync: no changes"
              if "GITHUB_OUTPUT" in os.environ:
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write(f"commit_msg={commit_msg}\n")

          if __name__ == "__main__":
              run_sniff()

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          # 👇 3. 提交插件读取全局环境变量
          file_pattern: ${{ env.TARGET_FILENAME }}
