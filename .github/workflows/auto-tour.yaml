name: Auto Discover Tournaments (Extreme Debug)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff and Report Status
        run: |
          import requests
          import json
          import re
          import sys
          from datetime import datetime

          # --- 配置 ---
          YEAR = 2026
          TEST_FILE = "tournaments-test.json"
          today = datetime.now().strftime("%Y-%m-%d")

          # 这里的名单保持最简，防止误杀
          BLACKLIST = ["Opening", "Promotion", "KeSPA", "Showmatch"]
          WHITELIST = ["LPL", "LCK", "LEC", "LCS"]

          def run_extreme_debug():
              url = "https://lol.fandom.com/api.php"
              
              # 使用最稳健的 Year 过滤
              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel",
                  "where": f"Year = '{YEAR}' AND DateStart IS NOT NULL",
                  "order_by": "DateStart DESC",
                  "limit": "100"
              }
              
              # 伪装成现代浏览器，绕过基础反爬
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36",
                  "Accept": "application/json"
              }

              print(f"📡 [DEBUG] 正在请求 Fandom API... (Year: {YEAR})")
              
              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=20)
                  
                  # --- 强制输出状态码 ---
                  print(f"🔢 HTTP Status: {resp.status_code}")
                  
                  if resp.status_code == 429:
                      print("❌ [ALERT] 触发 429 Rate Limit！Fandom 暂时拒绝了你的 IP。")
                      print(f"Retry-After Header: {resp.headers.get('Retry-After', 'None')}")
                      sys.exit(0) # 优雅退出，不标红

                  if resp.status_code != 200:
                      print(f"❌ [ERROR] 服务器返回异常: {resp.text}")
                      sys.exit(1)

                  raw_json = resp.json()
                  
                  # 检查 API 内部错误
                  if "error" in raw_json:
                      print(f"❌ [API ERROR] {json.dumps(raw_json['error'], indent=2)}")
                      sys.exit(1)

                  data = raw_json.get("cargoquery", [])
                  if not data:
                      print("📭 [EMPTY] 状态码 200，但库里没数据。")
                      print(f"原始响应: {json.dumps(raw_json, indent=2)}")
                      return

                  print(f"✅ 成功抓取到 {len(data)} 条原始记录，开始内存过滤...")

                  picked = {}
                  for item in data:
                      t = item["title"]
                      name, ov, level = t["Name"], t["OverviewPage"], t["TournamentLevel"]
                      
                      # 1. 黑名单 (不区分大小写)
                      if any(k.lower() in name.lower() for k in BLACKLIST):
                          continue
                      
                      # 2. 准入：是 S 级国际赛 OR 命中白名单
                      is_intl = (level == 'International') or any(k in name for k in ["MSI", "Worlds", "First Stand"])
                      is_white = any(k.lower() in ov.lower() for k in WHITELIST)
                      
                      if not (is_intl or is_white):
                          continue

                      # 分组逻辑
                      group = f"INTL_{name}" if is_intl else ov.split('/')[0].upper()
                      is_active = t["DateStart"] <= today <= (t.get("Date") or "2099-12-31")
                      
                      if group not in picked or is_active:
                          picked[group] = t
                          print(f"  > 锁定: {name}")

                  # --- 生成 JSON ---
                  final_output = []
                  for k in sorted(picked.keys()):
                      target = picked[k]
                      s_name = target["Name"].lower().replace(str(YEAR), "").replace("season", "").strip()
                      slug = re.sub(r'[^a-z0-9]+', '-', s_name).strip('-')
                      
                      final_output.append({
                          "slug": slug,
                          "overview_page": target["OverviewPage"],
                          "_debug_name": target["Name"]
                      })

                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(final_output, f, indent=4, ensure_ascii=False)
                  
                  print(f"🎉 任务成功，最终写入 {len(final_output)} 条数据。")

              except Exception as e:
                  print(f"💥 [CRASH] 脚本崩溃: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              run_extreme_debug()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Debug: Track API Status Codes"
          file_pattern: 'tournaments-test.json'
