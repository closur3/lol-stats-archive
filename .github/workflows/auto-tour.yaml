name: Auto Discover Tournaments (TEST)

on:
  workflow_dispatch: # 调试阶段建议仅手动触发

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff 2026 Tournaments (TEST MODE)
        run: |
          import requests
          import json
          import re
          from datetime import datetime

          # 配置：锁定 2026 年测试
          TARGET_REGIONS = ["LPL", "LCK", "LEC", "LCS"]
          YEAR = 2026
          today = datetime.now().strftime("%Y-%m-%d")
          
          # 测试文件名
          TEST_FILE = "tournaments-test.json"

          def run_test_sniff():
              url = "https://lol.fandom.com/api.php"
              
              # 构建查询条件：LIKE 匹配赛区层级 + 自动识别国际赛
              region_filter = " OR ".join([f"OverviewPage LIKE '{r}/{YEAR}%'" for r in TARGET_REGIONS])
              intl_filter = f"(TournamentLevel = 'International' AND Year = '{YEAR}')"
              where_sql = f"({region_filter} OR {intl_filter}) AND DateStart IS NOT NULL"

              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel",
                  "where": where_sql,
                  "order_by": "DateStart DESC",
                  "limit": "100"
              }
              headers = {"User-Agent": "Mozilla/5.0 LoLStatsTest/1.0"}

              try:
                  print(f"📡 正在拉取 Fandom {YEAR} 原始数据...")
                  resp = requests.get(url, params=params, headers=headers, timeout=20)
                  resp.raise_for_status()
                  data = resp.json().get("cargoquery", [])
                  
                  if not data:
                      print("⚠️ 未抓取到数据，请检查 YEAR 是否在 Fandom 中已有记录。")
                      return

                  picked = {}
                  for item in data:
                      t = item["title"]
                      ov = t["OverviewPage"]
                      level = t["TournamentLevel"]
                      
                      # 分组逻辑：国际赛独立，区域赛按大区聚合
                      group = f"INTL_{t['Name']}" if level == 'International' else ov.split('/')[0]
                      
                      # 只要是 2026 的，DESC 排序会让我们先拿到最新的（比如 Playoffs）
                      # 如果当前日期在比赛周期内，标记为 Active
                      is_active = t["DateStart"] <= today <= t["Date"]
                      
                      if group not in picked:
                          picked[group] = t
                      elif is_active:
                          # 正在进行的优先级最高，覆盖掉非进行的
                          picked[group] = t

                  final_output = []
                  # 排序：国际赛在前，四大赛区在后
                  sorted_keys = sorted(picked.keys(), key=lambda x: (0 if "INTL" in x else 1, x))
                  
                  for k in sorted_keys:
                      target = picked[k]
                      # Slug 精简化：去掉年份和 Season 字样
                      # LPL 2026 Season Split 1 Playoffs -> lpl-split-1-playoffs
                      raw_name = target["Name"]
                      clean_name = raw_name.lower().replace(str(YEAR), "").replace("season", "").strip()
                      slug = re.sub(r'[^a-z0-9]+', '-', clean_name).strip('-')
                      
                      final_output.append({
                          "slug": slug,
                          "overview_page": target["OverviewPage"],
                          "_debug_name": raw_name # 测试期保留原名方便对比
                      })
                  
                  # 写入测试文件
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(final_output, f, indent=4, ensure_ascii=False)
                  print(f"✅ 测试文件 {TEST_FILE} 已生成，包含 {len(final_output)} 个项目。")
                  
              except Exception as e:
                  print(f"❌ 运行失败: {e}")
                  exit(1)

          if __name__ == "__main__":
              run_test_sniff()
        shell: python

      - name: Commit and Push TEST
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧪 Test: Auto Rotate Tournaments (Isolation Mode)"
          file_pattern: 'tournaments-test.json'
