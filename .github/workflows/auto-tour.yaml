name: Auto Discover Tournaments (Ultimate Defender)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff, Filter and Debug
        run: |
          import requests
          import json
          import re
          from datetime import datetime, timedelta

          now = datetime.now()
          today_dt = now.date()
          TEST_FILE = "tournaments-test.json"

          # 统一预热期与过期缓冲
          PREHEAT_DAYS = 14 
          EXPIRE_DAYS = 1   

          # 核心防线：白名单放行赛区，黑名单兜底杀虫
          WHITELIST = ["LPL", "LCK"]
          BLACKLIST = ["Opening"]

          def run_sniff():
              url = "https://lol.fandom.com/api.php"
              
              # SQL层：彻底删除了 TournamentLevel，只限定年份和有时间的比赛。放宽 limit 以防被杂质冲刷。
              where_sql = f"(Year = '{now.year}' OR Year = '{now.year + 1}') AND DateStart IS NOT NULL"
              
              params = {
                  "action": "cargoquery", "format": "json", "tables": "Tournaments",
                  # 核心索要字段：放弃 Level，直接拿 Region, IsQualifier, IsPlayoffs
                  "fields": "Name, OverviewPage, DateStart, Date, Region, Year, IsQualifier, IsPlayoffs",
                  "where": where_sql, "order_by": "DateStart ASC", "limit": "400"
              }
              headers = {"User-Agent": "LoLStatsUltimate/29.0"}

              print(f"🚀 [INIT] 启动全量抓取 | 统一预热: {PREHEAT_DAYS}天\n" + "="*50)

              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=25)
                  data = resp.json().get("cargoquery", [])
                  if not data:
                      print("⚠️ [API] 未抓取到任何数据")
                      return
                  
                  print(f"📥 [API] 成功获取 {len(data)} 条原始数据，开始安检...\n" + "-"*50)

                  raw_groups = {}
                  for item in data:
                      t = item["title"]
                      name = t.get("Name", "")
                      ov = t.get("OverviewPage", "")
                      region = t.get("Region", "")
                      y = t.get("Year", "")
                      is_playoffs = t.get("IsPlayoffs")
                      is_qualifier = t.get("IsQualifier")
                      
                      # --- 🛡️ 第一道防线：底层字段与黑名单兜底 ---
                      if is_qualifier == "1":
                          # 太吵了，不打印所有的 Qualifier，默默干掉就行
                          continue 
                      if any(k.lower() in name.lower() for k in BLACKLIST):
                          print(f"🚫 [拦截-黑名单] 命中兜底词库 | Name: {name}")
                          continue

                      # --- 🛡️ 第二道防线：国际赛(靠Region)与白名单(靠LPL/LCK) ---
                      is_intl = (region == 'International')
                      is_white = any(k.upper() in ov.upper() for k in WHITELIST)

                      if not (is_intl or is_white):
                          # 打印被挡在门外的主流比赛，防误杀
                          print(f"🚫 [拦截-非目标] 既非国际赛也不在白名单 | Name: {name} | Region: {region}")
                          continue
                      
                      print(f"✅ [准入] 放行 | 身份: {'国际赛' if is_intl else '白名单'} | Name: {name}")

                      # --- ✂️ 第三道防线：靠 IsPlayoffs 精准切尾巴 ---
                      clean_ov = ov
                      if is_playoffs == "1" and not is_intl:
                          anchors = [r'Split[\s_]\d+', r'Cup', r'Season_Play-In', r'Season_Playoffs', r'Versus']
                          for pattern in anchors:
                              match = re.search(f'^(.+?{pattern})', ov, re.IGNORECASE)
                              if match:
                                  clean_ov = match.group(1)
                                  print(f"   ✂️ [切尾] 识别到季后赛，执行溯源: {ov} -> {clean_ov}")
                                  break

                      group_key = f"INTL_{name}" if is_intl else f"{clean_ov}_{y}"

                      try:
                          s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                          e_dt = datetime.strptime(t["Date"], '%Y-%m-%d').date() if t.get("Date") else s_dt
                      except: continue

                      # --- 🔗 终极合并：把时间交给亲爹 ---
                      if group_key not in raw_groups:
                          raw_groups[group_key] = {
                              "ov": clean_ov, "year": y, "name": name, "is_intl": is_intl,
                              "start": s_dt, "end": e_dt
                          }
                      else:
                          old_end = raw_groups[group_key]["end"]
                          raw_groups[group_key]["start"] = min(raw_groups[group_key]["start"], s_dt)
                          raw_groups[group_key]["end"] = max(raw_groups[group_key]["end"], e_dt)
                          if e_dt > old_end:
                              print(f"   🔗 [延寿] 成功吸收季后赛时间，结束日期延至 {e_dt}")

                  print("\n" + "="*50 + "\n🎯 [生命周期判定 (预热14天)]")
                  
                  final_output = []
                  for gk, v in raw_groups.items():
                      if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)):
                          print(f"⏳ [潜伏] {v['name']} | 开赛: {v['start']} (未满14天预热)")
                          continue
                      if today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)):
                          print(f"🗑️ [过期] {v['name']} | 结束: {v['end']} (已过保质期)")
                          continue

                      # Slug 极简生成
                      if v["is_intl"]:
                          slug_name = v["name"].lower().replace(str(v["year"]), "").replace("mid-season invitational", "msi").replace("world championship", "worlds").replace("esports world cup", "ewc").strip()
                          slug = f"{v['year']}-{re.sub(r'[^a-z0-9]+', '-', slug_name).strip('-')}"
                      else:
                          parts = v["ov"].split('/')
                          slug = f"{v['year']}-{parts[0].lower()}-{re.sub(r'[^a-z0-9]+', '-', parts[-1].lower()).strip('-')}"
                      
                      print(f"✨ [生成] Slug: {slug} | Date: {v['start']} ~ {v['end']}")
                      final_output.append({
                          "slug": slug, "overview_page": v["ov"],
                          "start_date": v["start"].strftime('%Y-%m-%d'), "end_date": v["end"].strftime('%Y-%m-%d')
                      })

                  unique_res = sorted([dict(t) for t in {tuple(d.items()) for d in final_output}], key=lambda x: x['slug'])
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(unique_res, f, indent=4, ensure_ascii=False)
                  
                  print("\n" + "="*50 + f"\n🎉 同步彻底完成。最终生成 {len(unique_res)} 条有效 JSON。")

              except Exception as e:
                  print(f"💥 异常崩溃: {e}")

          if __name__ == "__main__":
              run_sniff()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🛡️ Ultimate: Rely on Region, IsPlayoffs, and Blacklist with 14d preheat"
          file_pattern: 'tournaments-test.json'
