import requests
          import json
          from datetime import datetime

          def check_fandom_health():
              url = "https://lol.fandom.com/api.php"
              
              # 保持最基础的查询，不加任何复杂过滤，减少后端压力
              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart",
                  "where": "Year = '2026' AND DateStart IS NOT NULL",
                  "limit": "10"
              }
              
              # 使用更像浏览器的 Header
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              }

              print(f"📡 [DEBUG] 发起请求时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
              
              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=15)
                  
                  # --- 核心：报号码 ---
                  print(f"🔢 HTTP 状态码: {resp.status_code}")
                  
                  if resp.status_code == 429:
                      print("❌ 确定被限频 (429 Too Many Requests)！")
                      print(f"响应头 Retry-After: {resp.headers.get('Retry-After', '未提供')}")
                      return

                  if resp.status_code != 200:
                      print(f"❌ 非 200 错误: {resp.text}")
                      return

                  # --- 检查内容 ---
                  raw_data = resp.json()
                  if "error" in raw_data:
                      print(f"❌ API 内部报错: {json.dumps(raw_data['error'], indent=2)}")
                      return

                  results = raw_data.get("cargoquery", [])
                  if not results:
                      print("📭 状态码 200，但结果集为空 (空鱼篓现象)。")
                      print(f"完整响应内容: {json.dumps(raw_data, indent=2)}")
                  else:
                      print(f"✅ 成功拿到 {len(results)} 条数据。")
                      for i, item in enumerate(results):
                          print(f"  {i+1}. {item['title']['Name']}")

              except Exception as e:
                  print(f"💥 请求异常: {e}")

          if __name__ == "__main__":
              check_fandom_health()
