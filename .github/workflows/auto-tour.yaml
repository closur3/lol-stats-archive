name: Auto Discover Tournaments (Deep Debug & Anti-Limit)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff and Filter Tournaments
        run: |
          import requests
          import json
          import re
          import time
          import random
          import sys
          from datetime import datetime

          # --- ⚙️ 核心配置 ---
          YEAR = 2026
          TEST_FILE = "tournaments-test.json"
          today = datetime.now().strftime("%Y-%m-%d")

          WHITELIST = ["LPL", "LCK"]
          BLACKLIST = ["Opening", "Promotion", "LCK CL"]

          def run_extreme_sniff():
              url = "https://lol.fandom.com/api.php"
              
              # 构建 SQL
              path_filters = " OR ".join([f"OverviewPage LIKE '%{k}%'" for k in WHITELIST])
              where_sql = f"Year = '{YEAR}' AND ({path_filters}) AND DateStart IS NOT NULL"

              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel",
                  "where": where_sql,
                  "order_by": "DateStart DESC",
                  "limit": "200"
              }
              
              # 动态 User-Agent 伪装
              headers = {
                  "User-Agent": f"Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/{random.randint(110,122)}.0.0.0 Safari/537.36",
                  "Accept": "application/json"
              }

              print(f"🚀 [INIT] 开始任务 | 目标年份: {YEAR} | 当前日期: {today}")
              
              # --- 指数退避重试逻辑 (最多5次) ---
              for attempt in range(5):
                  if attempt > 0:
                      wait_time = (2 ** attempt) * 5 + random.uniform(5, 15)
                      print(f"\n⏳ [RETRY] 第 {attempt} 次失败，触发限频保护，休眠 {wait_time:.1f}s 后重试...")
                      time.sleep(wait_time)

                  try:
                      print(f"📡 [SEND] 正在请求 Fandom API... (Attempt {attempt + 1})")
                      resp = requests.get(url, params=params, headers=headers, timeout=25)
                      
                      # 打印基础调试号码
                      print(f"🔢 [HTTP Status] {resp.status_code}")
                      
                      # 即使是 200，也要检查内部的 "ratelimited"
                      try:
                          raw_json = resp.json()
                      except Exception as je:
                          print(f"💥 [JSON ERROR] 无法解析响应内容: {resp.text[:200]}")
                          continue

                      if "error" in raw_json:
                          err = raw_json["error"]
                          print(f"❌ [API ERROR] Code: {err.get('code')} | Info: {err.get('info')}")
                          if err.get('code') == 'ratelimited':
                              continue # 触发重试
                          else:
                              print("🚫 [FATAL] 遇到非限频类 API 错误，停止。")
                              sys.exit(1)

                      data = raw_json.get("cargoquery", [])
                      if not data:
                          print("📭 [DEBUG] 响应成功但结果集为空。")
                          print(f"DEBUG DATA: {json.dumps(raw_json, indent=2)}")
                          return

                      # --- 逻辑过滤开始 ---
                      print(f"📊 [PROCESS] 原始记录: {len(data)} 条 | 开始精筛...")
                      picked = {}
                      for item in data:
                          t = item["title"]
                          name, ov, level = t["Name"], t["OverviewPage"], t["TournamentLevel"] or "N/A"
                          
                          name_low, ov_low = name.lower(), ov.lower()
                          
                          # 1. 黑名单
                          if any(k.lower() in name_low or k.lower() in ov_low for k in BLACKLIST):
                              continue
                          
                          # 2. 准入
                          if not any(k.lower() in name_low or k.lower() in ov_low for k in WHITELIST):
                              continue

                          # 3. 分组
                          is_intl = (level == 'International') or any(k.lower() in name_low for k in ["msi", "worlds", "first stand", "ewc"])
                          group = f"INTL_{name}" if is_intl else ov.split('/')[0].upper()

                          # 4. 覆盖
                          is_active = t["DateStart"] <= today <= (t.get("Date") or "2099-12-31")
                          if group not in picked or is_active:
                              picked[group] = t
                              status = "🟢 ACTIVE" if is_active else "⚪ STANDBY"
                              print(f"✅ [LOCK] {group.ljust(12)}: {name} [{status}]")

                      # --- 输出结果 ---
                      final_output = []
                      sorted_keys = sorted(picked.keys(), key=lambda x: (0 if "INTL" in x else 1, x))
                      for k in sorted_keys:
                          target = picked[k]
                          s_name = target["Name"].lower().replace(str(YEAR), "").replace("season", "")
                          s_name = s_name.replace("mid-season invitational", "msi").replace("world championship", "worlds").strip()
                          slug = re.sub(r'[^a-z0-9]+', '-', s_name).strip('-')
                          
                          final_output.append({
                              "slug": slug,
                              "overview_page": target["OverviewPage"],
                              "_debug_name": target["Name"],
                              "_debug_status": "ACTIVE" if target["DateStart"] <= today <= (target.get("Date") or "2099-12-31") else "UPCOMING"
                          })
                      
                      with open(TEST_FILE, "w", encoding="utf-8") as f:
                          json.dump(final_output, f, indent=4, ensure_ascii=False)
                      
                      print(f"\n🎉 [SUCCESS] 任务圆满完成！生成 {len(final_output)} 个核心赛事。")
                      return # 成功后退出

                  except Exception as e:
                      print(f"💥 [CRASH] 异常: {e}")
                      time.sleep(5)

              print("\n💀 [FAIL] 经过多次重试，API 依然封锁或返回异常。")
              sys.exit(0) # 保持流程不标红，方便查看日志

          if __name__ == "__main__":
              run_extreme_sniff()
        shell: python

      - name: Commit and Push TEST
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧪 Debug: Extreme Sniffing with Anti-RateLimit"
          file_pattern: 'tournaments-test.json'
