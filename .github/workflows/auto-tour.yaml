name: Auto Discover Tournaments (Logic Final)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff and Filter Tournaments
        run: |
          import requests
          import json
          import re
          from datetime import datetime

          # --- ⚙️ 配置中心 ---
          YEAR = 2026
          TEST_FILE = "tournaments-test.json"
          today = datetime.now().strftime("%Y-%m-%d")

          # 【黑名单】：优先级最高，命中即死。
          # 建议包含次级联赛关键字，防止 LCK CL 或 LPLOL 混入。
          BLACKLIST = ["Opening", "Promotion", "CL", "LPLOL"]

          # 【白名单】：即使没被 Fandom 标记为 S 级，也要强行保留的关键字。
          WHITELIST = ["LPL", "LCK"]

          def run_final_logic():
              url = "https://lol.fandom.com/api.php"
              
              # SQL 提取：抓取 2026 年所有 S 级（顶级/国际）赛事
              where_sql = f"Year = '{YEAR}' AND (TournamentLevel = 'Primary' OR TournamentLevel = 'International') AND DateStart IS NOT NULL"

              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel",
                  "order_by": "DateStart DESC",
                  "limit": "200"
              }
              headers = {"User-Agent": "Mozilla/5.0 LoLStatsLogicFinal/1.0"}

              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=20)
                  resp.raise_for_status()
                  data = resp.json().get("cargoquery", [])
                  
                  if not data:
                      print("⚠️ Fandom 数据库 2026 表单暂时为空。")
                      return

                  picked = {}
                  for item in data:
                      t = item["title"]
                      name = t["Name"]
                      ov = t["OverviewPage"]
                      level = t["TournamentLevel"]
                      
                      # 预处理：去掉空格下划线转小写，防止匹配失败
                      name_norm = name.lower().replace(" ", "").replace("_", "")
                      ov_norm = ov.lower().replace(" ", "").replace("_", "")
                      
                      # 1. 【黑名单判定】：只要中了黑名单，管你是谁，直接踢掉
                      if any(k.lower().replace(" ", "") in name_norm for k in BLACKLIST):
                          continue
                      
                      # 2. 【准入判定】：你的逻辑核心
                      # 只要是 S 级 (Primary/International) 就默认要；
                      # 或者命中了你的白名单 (LPL/LCK) 也要。
                      is_s_level = level in ['Primary', 'International']
                      is_white = any(k.lower() in name_norm or k.lower() in ov_norm for k in WHITELIST)
                      
                      if not (is_s_level or is_white):
                          continue

                      # 3. 【分组逻辑】
                      # 国际赛按名独立；区域赛按前缀聚合（如 LEC, LCS, LPL, LCK）
                      if level == 'International' or any(k in name for k in ["MSI", "Worlds", "First Stand", "EWC"]):
                          group = f"INTL_{name}"
                      else:
                          group = ov.split('/')[0].upper()

                      # 4. 【动态切换】：Active 优先覆盖
                      is_active = t["DateStart"] <= today <= (t.get("Date") or "2099-12-31")
                      
                      if group not in picked or is_active:
                          picked[group] = t

                  # --- 生成 JSON ---
                  final_output = []
                  sorted_keys = sorted(picked.keys(), key=lambda x: (0 if "INTL" in x else 1, x))
                  
                  for k in sorted_keys:
                      target = picked[k]
                      # Slug 清理
                      s_name = target["Name"].lower().replace(str(YEAR), "").replace("season", "")
                      s_name = s_name.replace("mid-season invitational", "msi").replace("world championship", "worlds").strip()
                      slug = re.sub(r'[^a-z0-9]+', '-', s_name).strip('-')
                      
                      final_output.append({
                          "slug": slug,
                          "overview_page": target["OverviewPage"],
                          "_debug_name": target["Name"],
                          "_debug_status": "ACTIVE" if target["DateStart"] <= today <= (target.get("Date") or "2099-12-31") else "UPCOMING"
                      })
                  
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(final_output, f, indent=4, ensure_ascii=False)
                  
                  print(f"✅ 逻辑校验成功。共锁定 {len(final_output)} 个联赛（包含默认 S 级 + 白名单）。")

              except Exception as e:
                  print(f"💥 运行异常: {e}")
                  exit(1)

          if __name__ == "__main__":
              run_final_logic()
        shell: python

      - name: Commit and Push TEST
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto: Rotate Tournaments (Blacklist Priority Logic)"
          file_pattern: 'tournaments-test.json'
