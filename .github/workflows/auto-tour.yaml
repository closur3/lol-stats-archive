name: Auto Discover Tournaments (Standardized Logs)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Extract, Validate and Aggregate Data
        env:
          PYTHONUNBUFFERED: "1" # 强制 Python 禁用标准输出缓冲，实现绝对实时日志
        run: |
          import requests
          import json
          import re
          import time
          from datetime import datetime, timedelta
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          now = datetime.now()
          today_dt = now.date()
          TEST_FILE = "tournaments-test.json"

          PREHEAT_DAYS = 14 
          EXPIRE_DAYS = 1   

          WHITELIST = ["LPL", "LCK"]
          BLACKLIST = ["Opening", "Promotion", "KeSPA", "Showmatch", "LCK CL", "LPLOL", "Secondary", "Qualifier", "Academy", "Division"]

          def get_robust_session():
              session = requests.Session()
              retry_strategy = Retry(
                  total=5,
                  backoff_factor=2,
                  status_forcelist=[429, 500, 502, 503, 504],
                  allowed_methods=["GET"]
              )
              adapter = HTTPAdapter(max_retries=retry_strategy)
              session.mount("https://", adapter)
              return session

          def run_sniff():
              url = "https://lol.fandom.com/api.php"
              
              where_sql = f"(Year = '{now.year}' OR Year = '{now.year + 1}') AND DateStart IS NOT NULL AND TournamentLevel = 'Primary'"
              
              params = {
                  "action": "cargoquery", "format": "json", "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, Region, Year, IsQualifier, IsPlayoffs",
                  "where": where_sql, "order_by": "DateStart ASC", "limit": "400"
              }
              headers = {"User-Agent": "LoLStatsCI/34.0"}

              print(f"[INFO] Initialization complete. Target: Primary Level. Preheat window: {PREHEAT_DAYS} days.", flush=True)

              session = get_robust_session()
              data = []
              
              MAX_ATTEMPTS = 4
              for attempt in range(1, MAX_ATTEMPTS + 1):
                  try:
                      resp = session.get(url, params=params, headers=headers, timeout=30)
                      resp.raise_for_status()
                      resp_json = resp.json()
                      
                      if "error" in resp_json:
                          err_info = resp_json["error"]
                          print(f"[WARN] Application-level error during attempt {attempt}/{MAX_ATTEMPTS}. Details: {err_info}", flush=True)
                          if "ratelimit" in err_info.get("code", "").lower() or "limit" in err_info.get("code", "").lower():
                              sleep_time = 15 * attempt
                              print(f"[WARN] Rate limit exceeded. Backing off for {sleep_time} seconds.", flush=True)
                              time.sleep(sleep_time)
                              continue
                          else:
                              break
                              
                      data = resp_json.get("cargoquery", [])
                      if data:
                          print(f"[INFO] Successfully retrieved {len(data)} Primary records from API.", flush=True)
                          break
                      else:
                          print(f"[WARN] API returned empty dataset. Raw response: {resp_json}", flush=True)
                          break

                  except requests.exceptions.RequestException as e:
                      print(f"[ERROR] Network exception during attempt {attempt}/{MAX_ATTEMPTS}: {e}", flush=True)
                      time.sleep(5 * attempt)

              if not data:
                  print("[ERROR] Fatal: Data extraction failed after all attempts. Terminating process.", flush=True)
                  return

              raw_groups = {}
              print("[INFO] Commencing data validation and processing pipeline.", flush=True)
              
              for item in data:
                  t = item["title"]
                  name = t.get("Name", "")
                  ov = t.get("OverviewPage", "")
                  region = t.get("Region", "")
                  y = t.get("Year", "")
                  is_playoffs = t.get("IsPlayoffs")
                  is_qualifier = t.get("IsQualifier")
                  
                  if is_qualifier == "1":
                      continue 

                  if any(k.lower() in name.lower() for k in BLACKLIST):
                      print(f"[DEBUG] Validation failed [Blacklist]: {name}", flush=True)
                      continue

                  is_intl = (region == 'International')
                  is_white = any(k.upper() in ov.upper() for k in WHITELIST)

                  if not (is_intl or is_white):
                      print(f"[DEBUG] Validation failed [Out of Scope]: {name} | Region: {region}", flush=True)
                      continue
                  
                  category = 'Global Event (Region=Intl)' if is_intl else 'Regional Whitelist'
                  print(f"[INFO] Validation passed: {name} | Context: {category}", flush=True)

                  clean_ov = ov
                  if is_playoffs == "1" and not is_intl:
                      anchors = [r'Split[\s_]\d+', r'Cup', r'Season_Play-In', r'Season_Playoffs', r'Versus']
                      for pattern in anchors:
                          match = re.search(f'^(.+?{pattern})', ov, re.IGNORECASE)
                          if match:
                              clean_ov = match.group(1)
                              print(f"[DEBUG] Path normalization applied (Playoffs): {ov} -> {clean_ov}", flush=True)
                              break

                  group_key = f"INTL_{name}" if is_intl else f"{clean_ov}_{y}"

                  try:
                      s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                      e_dt = datetime.strptime(t["Date"], '%Y-%m-%d').date() if t.get("Date") else s_dt
                  except: continue

                  if group_key not in raw_groups:
                      raw_groups[group_key] = {
                          "ov": clean_ov, "year": y, "name": name, "is_intl": is_intl,
                          "start": s_dt, "end": e_dt
                      }
                  else:
                      old_end = raw_groups[group_key]["end"]
                      raw_groups[group_key]["start"] = min(raw_groups[group_key]["start"], s_dt)
                      raw_groups[group_key]["end"] = max(raw_groups[group_key]["end"], e_dt)
                      if e_dt > old_end:
                          print(f"[INFO] Schedule aggregated: {clean_ov} end date extended to {e_dt}", flush=True)

              print(f"[INFO] Commencing lifecycle filtering and format generation.", flush=True)
              
              final_output = []
              for gk, v in raw_groups.items():
                  if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)):
                      print(f"[DEBUG] Lifecycle filter [Pending]: {v['name']} | Start Date: {v['start']} (Exceeds {PREHEAT_DAYS}-day preheat)", flush=True)
                      continue
                  if today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      print(f"[DEBUG] Lifecycle filter [Expired]: {v['name']} | End Date: {v['end']}", flush=True)
                      continue

                  if v["is_intl"]:
                      slug_name = v["name"].lower().replace(str(v["year"]), "").replace("mid-season invitational", "msi").replace("world championship", "worlds").replace("esports world cup", "ewc").strip()
                      slug = f"{v['year']}-{re.sub(r'[^a-z0-9]+', '-', slug_name).strip('-')}"
                  else:
                      parts = v["ov"].split('/')
                      slug = f"{v['year']}-{parts[0].lower()}-{re.sub(r'[^a-z0-9]+', '-', parts[-1].lower()).strip('-')}"
                  
                  print(f"[INFO] Output generated: Slug [{slug}] | Date Range: {v['start']} to {v['end']}", flush=True)
                  final_output.append({
                      "slug": slug, "overview_page": v["ov"],
                      "start_date": v["start"].strftime('%Y-%m-%d'), "end_date": v["end"].strftime('%Y-%m-%d')
                  })

              unique_res = sorted([dict(t) for t in {tuple(d.items()) for d in final_output}], key=lambda x: x['slug'])
              with open(TEST_FILE, "w", encoding="utf-8") as f:
                  json.dump(unique_res, f, indent=4, ensure_ascii=False)
              
              print(f"[INFO] Execution complete. {len(unique_res)} valid configurations written to {TEST_FILE}.", flush=True)

          if __name__ == "__main__":
              run_sniff()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 Refactor: Implement unbuffered standard logging and formalize output tone"
          file_pattern: 'tournaments-test.json'
