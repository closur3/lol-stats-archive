name: Auto Discover Tournaments (Logic Restore)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff and Filter Tournaments
        run: |
          import requests
          import json
          import re
          from datetime import datetime

          YEAR = 2026
          today = datetime.now().strftime("%Y-%m-%d")
          TEST_FILE = "tournaments-test.json"

          # 【黑名单】：精准拦截。
          # 建议不要写太短的词（如 CL），改写全称或带空格的词
          BLACKLIST = ["Opening", "Promotion", "KeSPA", "Showmatch", "LCK CL", "LPLOL"]

          # 【白名单】：保底赛区
          WHITELIST = ["LPL", "LCK", "LEC", "LCS"]

          def run_restore_logic():
              url = "https://lol.fandom.com/api.php"
              
              # 保持最稳的 SQL 语句
              where_sql = f"Year = '{YEAR}' AND (TournamentLevel = 'Primary' OR TournamentLevel = 'International') AND DateStart IS NOT NULL"

              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel",
                  "order_by": "DateStart DESC",
                  "limit": "200"
              }
              headers = {"User-Agent": "Mozilla/5.0 LoLStatsLogicRestore/1.0"}

              try:
                  print(f"📡 正在拉取 {YEAR} 数据...")
                  resp = requests.get(url, params=params, headers=headers, timeout=20)
                  data = resp.json().get("cargoquery", [])
                  
                  if not data:
                      print("❌ API 层面未返回数据，请检查 SQL 语句。")
                      return

                  picked = {}
                  for item in data:
                      t = item["title"]
                      name = t["Name"]
                      ov = t["OverviewPage"]
                      level = t["TournamentLevel"]

                      # --- 调试日志：看看原始抓到了什么 ---
                      # print(f"DEBUG: 原始抓取 -> {name}")

                      # 1. 【黑名单判定】
                      is_black = False
                      for b_word in BLACKLIST:
                          if b_word.lower() in name.lower():
                              print(f"🚫 [BLACK] {name} 被关键字 '{b_word}' 拦截")
                              is_black = True
                              break
                      if is_black: continue

                      # 2. 【白名单/S级准入】
                      is_s_level = level in ['Primary', 'International']
                      is_white = any(w.lower() in name.lower() or w.lower() in ov.lower() for w in WHITELIST)
                      
                      if not (is_s_level or is_white):
                          # print(f"⚪ [IGNORE] {name} 级别不够且不在白名单")
                          continue

                      # 3. 【分组逻辑】
                      if level == 'International' or any(k in name for k in ["MSI", "Worlds", "First Stand"]):
                          group = f"INTL_{name}"
                      else:
                          group = ov.split('/')[0].upper()

                      # 4. 【Active 覆盖】
                      is_active = t["DateStart"] <= today <= (t.get("Date") or "2099-12-31")
                      if group not in picked or is_active:
                          picked[group] = t
                          print(f"✅ [LOCK] 成功锁定: {name}")

                  # --- 生成 JSON ---
                  final_output = []
                  sorted_keys = sorted(picked.keys(), key=lambda x: (0 if "INTL" in x else 1, x))
                  
                  for k in sorted_keys:
                      target = picked[k]
                      s_name = target["Name"].lower().replace(str(YEAR), "").replace("season", "")
                      s_name = s_name.replace("mid-season invitational", "msi").replace("world championship", "worlds").strip()
                      slug = re.sub(r'[^a-z0-9]+', '-', s_name).strip('-')
                      
                      final_output.append({
                          "slug": slug,
                          "overview_page": target["OverviewPage"],
                          "_debug_name": target["Name"]
                      })
                  
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(final_output, f, indent=4, ensure_ascii=False)
                  
                  print(f"\n🎉 锁定完成，共 {len(final_output)} 个赛事。")

              except Exception as e:
                  print(f"💥 运行崩溃: {e}")

          if __name__ == "__main__":
              run_restore_logic()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Logic Restored: Blacklist/Whitelist Fixed"
          file_pattern: 'tournaments-test.json'
