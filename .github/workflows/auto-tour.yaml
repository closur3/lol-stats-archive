name: Auto Discover Tournaments (Final Sniff)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff S-Level Tournaments (Filtered)
        run: |
          import requests
          import json
          import re
          from datetime import datetime

          # --- ⚙️ 核心名单配置 ---
          YEAR = 2026
          TEST_FILE = "tournaments-test.json"
          today = datetime.now().strftime("%Y-%m-%d")

          # 【黑名单】：包含这些关键字的 Name 或 Region 直接踢掉
          BLACKLIST = ["Promotion", "Opening", ]
          # 【白名单】：即使级别没达到 Primary，只要包含这些关键字也强制保留
          WHITELIST = ["LPL", "LCK"]

          def run_filtered_sniff():
              url = "https://lol.fandom.com/api.php"
              where_sql = f"Year = '{YEAR}' AND (TournamentLevel = 'Primary' OR TournamentLevel = 'International') AND DateStart IS NOT NULL"

              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel",
                  "order_by": "DateStart DESC",
                  "limit": "200"
              }
              headers = {"User-Agent": "Mozilla/5.0 LoLStatsFinal/1.0"}

              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=20)
                  resp.raise_for_status()
                  data = resp.json().get("cargoquery", [])
                  
                  picked = {}
                  for item in data:
                      t = item["title"]
                      name = t["Name"]
                      ov = t["OverviewPage"]
                      level = t["TournamentLevel"]
                      
                      # 1. 黑名单硬过滤
                      if any(k in name for k in BLACKLIST) or any(k in ov for k in BLACKLIST):
                          continue
                      
                      # 2. 白名单校验 (确保至少匹配一个核心关键字)
                      if not any(k in name or k in ov for k in WHITELIST):
                          continue

                      # 3. 分组聚合逻辑
                      group = f"INTL_{name}" if level == 'International' else ov.split('/')[0]
                      is_active = t["DateStart"] <= today <= t["Date"]
                      
                      if group not in picked or is_active:
                          picked[group] = t

                  # --- 生成最终列表 ---
                  final_output = []
                  sorted_keys = sorted(picked.keys(), key=lambda x: (0 if "INTL" in x else 1, x))
                  
                  for k in sorted_keys:
                      target = picked[k]
                      raw_name = target["Name"]
                      
                      # Slug 清洗
                      name_clean = raw_name.lower().replace(str(YEAR), "").replace("season", "")
                      name_clean = name_clean.replace("mid-season invitational", "msi").replace("world championship", "worlds").strip()
                      slug = re.sub(r'[^a-z0-9]+', '-', name_clean).strip('-')
                      
                      final_output.append({
                          "slug": slug,
                          "overview_page": target["OverviewPage"],
                          "_debug_name": raw_name
                      })
                  
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(final_output, f, indent=4, ensure_ascii=False)
                  
                  print(f"✅ 过滤完成。共锁定 {len(final_output)} 个核心 S 级赛事。")

              except Exception as e:
                  print(f"❌ 运行失败: {e}")
                  exit(1)

          if __name__ == "__main__":
              run_filtered_sniff()
        shell: python

      - name: Commit and Push TEST
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto: Rotate Tournaments (Black/White List Applied)"
          file_pattern: 'tournaments-test.json'
