name: Auto Discover Tournaments (Strict Filter)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff and Filter
        run: |
          import requests
          import json
          import re
          import time
          import random
          from datetime import datetime, timedelta

          now = datetime.now()
          THIS_YEAR, NEXT_YEAR = now.year, now.year + 1
          today_dt = now.date()
          TEST_FILE = "tournaments-test.json"

          PREHEAT_DAYS = 14 
          EXPIRE_DAYS = 1   

          # === 🎯 核心过滤配置 ===
          BLACKLIST = ["Opening", "LCK CL", "LPLOL"]
          WHITELIST = ["LPL", "LCK"]

          def get_clean_root(ov, level):
              if level == 'International': return ov
              
              # === 🎯 核心断尾逻辑 ===
              # 只要匹配到 Split_1 / Cup / Season_Play-In，直接砍掉后面的所有后缀 (如 _Playoffs)
              anchors = [r'Split[\s_]\d+', r'Cup', r'Season_Play-In', r'Season_Playoffs']
              for pattern in anchors:
                  match = re.search(f'^(.+?{pattern})', ov, re.IGNORECASE)
                  if match:
                      return match.group(1) # 直接返回 LPL/2026_Season/Split_1
              
              return ov # 没匹配到锚点，原封不动返回

          def run_sniff():
              url = "https://lol.fandom.com/api.php"
              where_sql = f"(Year = '{THIS_YEAR}' OR Year = '{NEXT_YEAR}') AND DateStart IS NOT NULL"
              params = {
                  "action": "cargoquery", "format": "json", "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel, Year",
                  "where": where_sql, "order_by": "DateStart ASC", "limit": "400"
              }
              headers = {"User-Agent": f"LoLStatsFilter/19.0 (Chrome/{random.randint(110,125)})"}

              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=25)
                  data = resp.json().get("cargoquery", [])
                  if not data: return

                  raw_groups = {}
                  for item in data:
                      t = item["title"]
                      name, ov, level, y = t["Name"], t["OverviewPage"], t["TournamentLevel"] or "N/A", t["Year"]
                      
                      # --- 1. 黑名单过滤 ---
                      if any(k.lower() in name.lower() or k.lower() in ov.lower() for k in BLACKLIST): 
                          continue
                      
                      # --- 2. 国际赛 + 白名单过滤 ---
                      # 强制要求：要么是国际赛，要么在白名单赛区里
                      is_intl = (level == 'International')
                      is_white = any(k.upper() in ov.upper() for k in WHITELIST)
                      
                      if not (is_intl or is_white): 
                          continue

                      # --- 3. 路径归一化与时间聚合 ---
                      clean_ov = get_clean_root(ov, level)
                      group_key = f"INTL_{name}" if is_intl else f"{clean_ov}_{y}"

                      try:
                          s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                          e_dt = datetime.strptime(t["Date"], '%Y-%m-%d').date() if t.get("Date") else s_dt
                      except: continue

                      if group_key not in raw_groups:
                          raw_groups[group_key] = {
                              "ov": clean_ov, "year": y, "name": name, "is_intl": is_intl,
                              "start": s_dt, "end": e_dt
                          }
                      else:
                          # 聚合：把 Playoffs 的结束时间也拉长到主路径里
                          raw_groups[group_key]["start"] = min(raw_groups[group_key]["start"], s_dt)
                          raw_groups[group_key]["end"] = max(raw_groups[group_key]["end"], e_dt)

                  # --- 4. 生命周期过滤与输出 ---
                  final_output = []
                  for gk, v in raw_groups.items():
                      if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)): continue
                      if today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)): continue

                      y = v["year"]
                      if v["is_intl"]:
                          s_name = v["name"].lower().replace(str(y), "").replace("mid-season invitational", "msi").replace("world championship", "worlds").strip()
                          slug = f"{y}-{re.sub(r'[^a-z0-9]+', '-', s_name).strip('-')}"
                      else:
                          # 直接用最后一段生成 Slug，例如 2026-lpl-split-1
                          parts = v["ov"].split('/')
                          league = parts[0].lower()
                          stage = parts[-1].lower()
                          stage_slug = re.sub(r'[^a-z0-9]+', '-', stage).strip('-')
                          slug = f"{y}-{league}-{stage_slug}"

                      final_output.append({
                          "slug": slug,
                          "overview_page": v["ov"],
                          "start_date": v["start"].strftime('%Y-%m-%d'),
                          "end_date": v["end"].strftime('%Y-%m-%d')
                      })

                  unique_res = sorted([dict(t) for t in {tuple(d.items()) for d in final_output}], key=lambda x: x['slug'])
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(unique_res, f, indent=4, ensure_ascii=False)
                  
                  print(f"🎉 严格过滤同步完成。当前有效配置数: {len(unique_res)}")

              except Exception as e:
                  print(f"💥 异常: {e}")

          if __name__ == "__main__":
              run_sniff()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Strict Filter: Blacklist + Whitelist + Intl only"
          file_pattern: 'tournaments-test.json'
