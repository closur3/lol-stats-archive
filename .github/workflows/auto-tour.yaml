name: Auto Discover Tournaments (S-Level TEST)

on:
  schedule:
    - cron: '0 23 * * *' # 北京时间每天早上 07:00 自动检查
  push:
    paths:
      - '.github/workflows/auto-tour-test.yaml' # 修改此脚本后立即触发
      - 'teams.json' # 修改战队映射后触发
  workflow_dispatch: # 保持手动触发按钮

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sniff S-Level Tournaments
        run: |
          import requests
          import json
          import re
          from datetime import datetime

          # 配置
          YEAR = 2026
          TEST_FILE = "tournaments-test.json"
          today = datetime.now().strftime("%Y-%m-%d")

          def run_s_level_sniff():
              url = "https://lol.fandom.com/api.php"
              
              # 【S级过滤逻辑】：Primary(顶级联赛) 或 International(国际大赛)
              where_sql = f"Year = '{YEAR}' AND (TournamentLevel = 'Primary' OR TournamentLevel = 'International') AND DateStart IS NOT NULL"

              params = {
                  "action": "cargoquery",
                  "format": "json",
                  "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel, League",
                  "where": where_sql,
                  "order_by": "DateStart DESC",
                  "limit": "150"
              }
              headers = {"User-Agent": "Mozilla/5.0 LoLStatsSLevelTest/1.0"}

              try:
                  print(f"📡 正在探测 {YEAR} 全球顶级赛事...")
                  resp = requests.get(url, params=params, headers=headers, timeout=20)
                  resp.raise_for_status()
                  data = resp.json().get("cargoquery", [])
                  
                  if not data:
                      print("⚠️ 没抓到数据，Fandom 数据库可能还没录入 2026 的 S 级标签。")
                      return

                  picked = {}
                  for item in data:
                      t = item["title"]
                      ov = t["OverviewPage"]
                      level = t["TournamentLevel"]
                      
                      # 分组：国际赛独立，区域赛按赛区前缀聚合
                      if level == 'International':
                          group = f"INTL_{t['Name']}"
                      else:
                          group = ov.split('/')[0]

                      is_active = t["DateStart"] <= today <= t["Date"]
                      
                      # 逻辑：每个组只留一个最新的。如果是 Active(正在打)，则强制覆盖旧的
                      if group not in picked or is_active:
                          picked[group] = t

                  final_output = []
                  # 排序：国际赛排在最前
                  sorted_keys = sorted(picked.keys(), key=lambda x: (0 if "INTL" in x else 1, x))
                  
                  for k in sorted_keys:
                      target = picked[k]
                      raw_name = target["Name"]
                      
                      # Slug 清洗：去掉 2026, Season, 缩写 MSI/Worlds
                      name_clean = raw_name.lower().replace(str(YEAR), "").replace("season", "")
                      name_clean = name_clean.replace("mid-season invitational", "msi").replace("world championship", "worlds").strip()
                      slug = re.sub(r'[^a-z0-9]+', '-', name_clean).strip('-')
                      
                      final_output.append({
                          "slug": slug,
                          "overview_page": target["OverviewPage"],
                          "_debug_name": raw_name # 方便测试校验
                      })
                  
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(final_output, f, indent=4, ensure_ascii=False)
                  
                  print(f"✅ [SUCCESS] 测试文件 {TEST_FILE} 已更新。")
                  print(f"📊 结果：共锁定 {len(final_output)} 个 S 级赛事。")

              except Exception as e:
                  print(f"❌ 运行崩溃: {e}")
                  exit(1)

          if __name__ == "__main__":
              run_s_level_sniff()
        shell: python

      - name: Commit and Push TEST
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧪 Test: Auto Discover S-Level (Push Triggered)"
          file_pattern: 'tournaments-test.json'
