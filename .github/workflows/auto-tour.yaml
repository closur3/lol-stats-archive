name: Auto Discover Tournaments (Date Aggregation)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tournaments-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Aggregated Sniff
        run: |
          import requests
          import json
          import re
          import time
          import random
          import sys
          from datetime import datetime, timedelta

          now = datetime.now()
          THIS_YEAR, NEXT_YEAR = now.year, now.year + 1
          today_dt = now.date()
          TEST_FILE = "tournaments-test.json"

          # 预热与缓冲设置
          PREHEAT_DAYS = 14 
          EXPIRE_DAYS = 1   

          BLACKLIST = ["Opening", "Promotion", "KeSPA", "Showmatch", "LCK CL", "LPLOL", "Secondary"]
          WHITELIST = ["LPL", "LCK"]

          def run_aggregated_sniff():
              url = "https://lol.fandom.com/api.php"
              where_sql = f"(Year = '{THIS_YEAR}' OR Year = '{NEXT_YEAR}') AND DateStart IS NOT NULL"
              params = {
                  "action": "cargoquery", "format": "json", "tables": "Tournaments",
                  "fields": "Name, OverviewPage, DateStart, Date, TournamentLevel, Year",
                  "where": where_sql, "order_by": "DateStart ASC", "limit": "250"
              }
              headers = {"User-Agent": f"LoLStatsAggregator/9.0 (Chrome/{random.randint(110,125)})"}

              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=25)
                  data = resp.json().get("cargoquery", [])
                  if not data: return

                  # --- 第一阶段：按“根路径”归一化并聚合时间 ---
                  raw_groups = {}
                  for item in data:
                      t = item["title"]
                      name, ov, level, item_year = t["Name"], t["OverviewPage"], t["TournamentLevel"] or "N/A", t["Year"]
                      
                      if any(k.lower() in name.lower() or k.lower() in ov.lower() for k in BLACKLIST): continue
                      if not (level in ['Primary', 'International'] or any(k.lower() in name.lower() for k in WHITELIST)): continue

                      # 核心：剥离后缀，获取根路径
                      clean_ov = re.sub(r'/(Playoffs|Group Stage|Knockout Stage|Regional Finals|Main Event|Regular Season)$', '', ov)
                      
                      # 国际赛按名独立，区域赛按根路径分组
                      is_intl = (level == 'International')
                      group_key = f"INTL_{name}" if is_intl else f"{clean_ov}_{item_year}"

                      # 时间解析
                      try:
                          s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                          e_dt = datetime.strptime(t["Date"], '%Y-%m-%d').date() if t.get("Date") else s_dt
                      except: continue

                      if group_key not in raw_groups:
                          raw_groups[group_key] = {
                              "ov": clean_ov, "year": item_year, "name": name, "is_intl": is_intl,
                              "min_start": s_dt, "max_end": e_dt
                          }
                      else:
                          # 聚合：取最早开始和最晚结束
                          raw_groups[group_key]["min_start"] = min(raw_groups[group_key]["min_start"], s_dt)
                          raw_groups[group_key]["max_end"] = max(raw_groups[group_key]["max_end"], e_dt)

                  # --- 第二阶段：基于聚合后的时间轴进行生命周期判定 ---
                  final_output = []
                  for gk, val in raw_groups.items():
                      # 预热判定
                      if val["min_start"] > (today_dt + timedelta(days=PREHEAT_DAYS)): continue
                      # 剔除判定：只有当最晚的结束时间（如季后赛结束）也过期了，才删除
                      if today_dt > (val["max_end"] + timedelta(days=EXPIRE_DAYS)): continue

                      # 生成 Slug (同前逻辑)
                      league_prefix = val["ov"].split('/')[0].lower()
                      s_part = val["name"].lower().replace(str(val["year"]), "").strip()
                      s_part = re.sub(r'(playoffs|group stage|regional finals|regular season)', '', s_part).strip()
                      slug_body = re.sub(r'[^a-z0-9]+', '-', s_part).strip('-')
                      
                      if val["is_intl"]:
                          s_part = s_part.replace("mid-season invitational", "msi").replace("world championship", "worlds")
                          slug = f"{val['year']}-{re.sub(r'[^a-z0-9]+', '-', s_part).strip('-')}"
                      else:
                          slug = f"{val['year']}-{slug_body}" if slug_body.startswith(league_prefix) else f"{val['year']}-{league_prefix}-{slug_body}"

                      final_output.append({
                          "slug": slug,
                          "overview_page": val["ov"],
                          "start_date": val["min_start"].strftime('%Y-%m-%d'),
                          "end_date": val["max_end"].strftime('%Y-%m-%d')
                      })

                  # 排序去重
                  unique_res = sorted([dict(t) for t in {tuple(d.items()) for d in final_output}], key=lambda x: x['slug'])
                  with open(TEST_FILE, "w", encoding="utf-8") as f:
                      json.dump(unique_res, f, indent=4, ensure_ascii=False)
                  
                  print(f"🎉 聚合同步完成。已将常规赛与季后赛合并至主路径。")

              except Exception as e:
                  print(f"💥 异常: {e}")

          if __name__ == "__main__":
              run_aggregated_sniff()
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Aggregation: Combined split lifecycle"
          file_pattern: 'tournaments-test.json'
