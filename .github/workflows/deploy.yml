name: Deploy Worker

on:
  push:
    paths:
      - '_worker.js'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --var GITHUB_SHA:${{ github.sha }} --var GITHUB_TIME:"$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
