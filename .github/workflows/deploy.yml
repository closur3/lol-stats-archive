name: "Deploy: Publish Worker"
on:
  push:
    paths:
      - 'wrangler.toml'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Time Variable
        run: echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          vars: |
            GITHUB_SHA
            GITHUB_TIME
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TIME: ${{ env.CURRENT_TIME }}
      - name: Refresh UI
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          WORKER_URL="https://lol-stats.closur3.workers.dev"
          DEPLOY_SHORT_SHA="${DEPLOY_SHA:0:7}"
          START=$(date +%s)

          call_post_json() {
            local endpoint="$1"
            local body="$2"
            curl -sS -X POST "$WORKER_URL/$endpoint?cb=$(date +%s)" \
              -H "Authorization: Bearer $ADMIN_SECRET" \
              -H "Cache-Control: no-cache" \
              -H "Content-Type: application/json" \
              -d "$body" \
              -w "\n%{http_code}" --max-time 240 2>&1 || true
          }

          # Step 1: Wait for new code to be live (/version no-store)
          echo "=== Step 1: Verify deploy (/version, SHA=$DEPLOY_SHORT_SHA) ==="
          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            if [ $ELAPSED -ge 120 ]; then
              echo "❌ Deploy verification timed out after 120s"
              exit 1
            fi

            VERSION_JSON=$(curl -sf --max-time 10 "$WORKER_URL/version?cb=$(date +%s)" \
                 -H "Cache-Control: no-cache") || true
            LIVE_SHA=$(echo "$VERSION_JSON" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p' | cut -c1-7)

            if [ "$LIVE_SHA" = "$DEPLOY_SHORT_SHA" ]; then
              echo "✅ New code live after ${ELAPSED}s (SHA=$LIVE_SHA)"
              break
            fi

            echo "  waiting... (${ELAPSED}s, live=$LIVE_SHA)"
            sleep 3
          done

          # Step 2: One-shot deploy refresh (server-side retry only)
          echo ""
          echo "=== Step 2: Deploy Refresh ==="
          PAYLOAD='{"maxWaitMs":300000,"pollMs":5000}'
          REFRESH_OK=0
          for attempt in 1 2; do
            echo "--- deploy-refresh attempt $attempt/2 ---"
            HTTP_RAW=$(call_post_json "deploy-refresh" "$PAYLOAD")
            HTTP_CODE=$(echo "$HTTP_RAW" | tail -1)
            BODY=$(echo "$HTTP_RAW" | sed '$d')
            echo "HTTP $HTTP_CODE | $BODY"
            if [ "$HTTP_CODE" = "200" ]; then
              REFRESH_OK=1
              break
            fi
            if [ $attempt -lt 2 ]; then
              echo "⚠️ deploy-refresh failed once, retrying in 10s..."
              sleep 10
            fi
          done
          if [ $REFRESH_OK -ne 1 ]; then
            echo "❌ Deploy refresh failed"
            exit 1
          fi

          # Step 3: Verify homepage content is updated to deployed SHA
          echo ""
          echo "=== Step 3: Verify homepage content (@$DEPLOY_SHORT_SHA) ==="
          VERIFY_START=$(date +%s)
          while true; do
            ELAPSED=$(( $(date +%s) - VERIFY_START ))
            if [ $ELAPSED -ge 180 ]; then
              echo "❌ Homepage verification timed out after 180s"
              exit 1
            fi

            HOME_HTML=$(curl -sf --max-time 10 "$WORKER_URL/?cb=$(date +%s)" \
              -H "Cache-Control: no-cache") || true

            if echo "$HOME_HTML" | grep -q "@$DEPLOY_SHORT_SHA"; then
              echo "✅ Homepage updated after ${ELAPSED}s (@$DEPLOY_SHORT_SHA)"
              exit 0
            fi

            echo "  waiting... (${ELAPSED}s, homepage sha not updated)"
            sleep 5
          done
