name: Deploy Worker

on:
  push:
    paths:
      - '_worker.js'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 核心修复：使用 GitHub 原生时间戳，避开 Shell 执行错误
          vars: |
            GITHUB_SHA: '${{ github.sha }}'
            GITHUB_TIME: '${{ github.event.head_commit.timestamp }}'
