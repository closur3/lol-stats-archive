name: "Deploy: Publish Worker"
on:
  push:
    paths:
      - 'wrangler.toml'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Time Variable
        run: echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          vars: |
            GITHUB_SHA
            GITHUB_TIME
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TIME: ${{ env.CURRENT_TIME }}
      - name: Refresh UI
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          WORKER_URL="https://lol-stats.closur3.workers.dev"
          MAX_RETRIES=5

          echo "Waiting 5s for worker cold start..."
          sleep 5

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "--- Attempt $attempt/$MAX_RETRIES ---"
            HTTP_BODY=$(curl -s -X POST "$WORKER_URL/refresh-ui" \
                 -H "Authorization: Bearer $ADMIN_SECRET" \
                 -w "\n%{http_code}" --max-time 60 --connect-timeout 10 2>&1) || true

            HTTP_CODE=$(echo "$HTTP_BODY" | tail -1)
            RESPONSE_TEXT=$(echo "$HTTP_BODY" | sed '$d')
            echo "HTTP $HTTP_CODE | Response: $RESPONSE_TEXT"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Refresh UI succeeded."
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              WAIT=$((attempt * 5))
              echo "⏳ Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "❌ Refresh UI failed after $MAX_RETRIES attempts."
          exit 1
