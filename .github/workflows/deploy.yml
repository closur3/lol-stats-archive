name: "Deploy: Publish Worker"
on:
  push:
    paths:
      - '_worker.js'
      - 'wrangler.toml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Time Variable
        run: echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          vars: |
            GITHUB_SHA
            GITHUB_TIME
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TIME: ${{ env.CURRENT_TIME }}
      - name: Refresh UI
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          WORKER_URL="https://lol-stats.closur3.workers.dev"
          MAX_ATTEMPTS=30
          INTERVAL=1
          CONFIRM_NEEDED=3
          DEPLOY_SHORT_SHA="${DEPLOY_SHA:0:7}"
          CONFIRM_COUNT=0

          echo "Waiting 5s before polling..."
          sleep 5

          echo "Waiting for Worker to serve SHA: $DEPLOY_SHORT_SHA"
          for i in $(seq 1 $MAX_ATTEMPTS); do
            LIVE_SHORT_SHA=$(curl -sf "$WORKER_URL/logs" | grep -o 'class="footer-sha">@[0-9a-f]*' | grep -o '[0-9a-f]*$')
            if [ "$LIVE_SHORT_SHA" = "$DEPLOY_SHORT_SHA" ]; then
              CONFIRM_COUNT=$((CONFIRM_COUNT + 1))
              echo "Attempt $i: matched ($CONFIRM_COUNT/$CONFIRM_NEEDED)"
              if [ "$CONFIRM_COUNT" -ge "$CONFIRM_NEEDED" ]; then
                echo "✅ Worker stable. Triggering /refresh-ui..."
                curl -X POST "$WORKER_URL/refresh-ui" \
                     -H "Authorization: Bearer $ADMIN_SECRET" \
                     -w "\nHTTP Status: %{http_code}\n"
                exit 0
              fi
            else
              CONFIRM_COUNT=0
              echo "Attempt $i/$MAX_ATTEMPTS: live=$LIVE_SHORT_SHA, expected=$DEPLOY_SHORT_SHA — retrying in ${INTERVAL}s"
            fi
            sleep $INTERVAL
          done

          echo "❌ Timed out. Worker did not stabilize."
          exit 1
