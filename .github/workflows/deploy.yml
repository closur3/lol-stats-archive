name: "Deploy: Publish Worker"
on:
  push:
    paths:
      - 'wrangler.toml'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Time Variable
        run: echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          vars: |
            GITHUB_SHA
            GITHUB_TIME
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TIME: ${{ env.CURRENT_TIME }}

      - name: Refresh UI
        env:
          WORKER_BASE_URL: "https://lol.hsux.de"
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          TARGET_SHORT_SHA="${TARGET_SHA:0:7}"
          echo "Target short sha: ${TARGET_SHORT_SHA}"

          extract_footer_sha() {
            sed -nE 's/.*class="footer-sha">@([0-9a-f]{7})<.*/\1/p' | head -n1
          }

          echo "Checking deployed sha from /logs footer..."
          LOGS_SHA="$(curl -fsSL "${WORKER_BASE_URL}/logs?ts=$(date +%s%N)" | extract_footer_sha || true)"
          echo "Logs footer sha: ${LOGS_SHA:-<empty>}"

          if [[ "${LOGS_SHA}" != "${TARGET_SHORT_SHA}" ]]; then
            echo "Deploy not ready: /logs footer sha != target sha"
            exit 1
          fi

          REFRESH_URL="${WORKER_BASE_URL}/refresh-ui"
          HOME_URL="${WORKER_BASE_URL}/"
          REFRESH_HEADERS=(-H "Authorization: Bearer ${ADMIN_SECRET}")

          echo "Deploy confirmed. Start refresh-ui loop until home footer sha matches..."
          while true; do
            curl -fsSL -X POST "${REFRESH_URL}" "${REFRESH_HEADERS[@]}" > /dev/null

            HOME_SHA="$(curl -fsSL "${HOME_URL}?ts=$(date +%s%N)" | extract_footer_sha || true)"
            echo "Home footer sha: ${HOME_SHA:-<empty>}"

            if [[ "${HOME_SHA}" == "${TARGET_SHORT_SHA}" ]]; then
              echo "Home footer sha matches target sha. Refresh complete."
              break
            fi

            sleep 3
          done
