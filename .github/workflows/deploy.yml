name: "Deploy: Publish Worker"

on:
  push:
    paths:
      - '_worker.js'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Time Variable
        run: echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Install Wrangler
        run: npm install -g wrangler
  
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          vars: |
            GITHUB_SHA
            GITHUB_TIME
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TIME: ${{ env.CURRENT_TIME }}

      - name: Auto Refresh UI
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          sleep 2
          
          echo "Triggering /refresh-ui endpoint..."
          curl -X POST https://lol-stats.closur3.workers.dev/refresh-ui \
               -H "Authorization: Bearer $ADMIN_SECRET" \
               -w "\nHTTP Status: %{http_code}\n"
