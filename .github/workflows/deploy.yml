name: "Deploy: Publish Worker"
on:
  push:
    paths:
      - 'wrangler.toml'
      - 'src/**'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set Src Commit Metadata
        run: |
          echo "SRC_COMMIT_SHA=$(git log -1 --format='%H' -- src)" >> "$GITHUB_ENV"
          echo "SRC_COMMIT_TIME=$(TZ=Asia/Shanghai git log -1 --date=format-local:'%Y-%m-%d %H:%M:%S' --format='%cd' -- src)" >> "$GITHUB_ENV"
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --var GITHUB_SHA:${{ env.SRC_COMMIT_SHA }} --var GITHUB_TIME:"${{ env.SRC_COMMIT_TIME }}"
        env:
          GITHUB_SHA: ${{ env.SRC_COMMIT_SHA }}
          GITHUB_TIME: ${{ env.SRC_COMMIT_TIME }}
