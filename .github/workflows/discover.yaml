name: Discover Tournaments

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *' 

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET_FILENAME: 'tour.json'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Tournament Data
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Tokyo
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        shell: python
        run: |
          import requests, json, re, time, os, sys
          from datetime import datetime, timedelta

          now = datetime.now()
          today_dt = now.date()

          TARGET_FILE = os.environ.get("TARGET_FILENAME")

          # ==================== 配置区 ====================
          PREHEAT_DAYS, EXPIRE_DAYS = 7, 1
          WHITELIST = []
          BLACKLIST = ["Opening"]

          # 名字聚合替换字典（模糊匹配）
          NAME_MAPPING = {
              "Rounds 1-2": "Rounds 1-4",
              "Rounds 3-4": "Rounds 1-4",
          }

          CARGO_FIELDS = [
              "Name", "OverviewPage", "DateStart", "Date", "Region", "Year", "IsPlayoffs", "League"
          ]
          CARGO_WHERE = {
              "Year": [now.year],
              "TournamentLevel": "Primary",
              "IsQualifier": "0",
              "Region": ["International", "China", "Korea"],
          }
          CARGO_WHERE_RAW = [
              "DateStart IS NOT NULL",
          ]
          CARGO_ORDER_BY = "DateStart ASC"
          # ================================================

          def build_where(where_dict, raw=None):
              parts = []
              for k, v in where_dict.items():
                  if isinstance(v, list):
                      if len(v) == 1:
                          parts.append(f"{k} = '{v[0]}'")
                      else:
                          values = ", ".join(f"'{x}'" for x in v)
                          parts.append(f"{k} IN ({values})")
                  else:
                      parts.append(f"{k} = '{v}'")
              if raw:
                  parts.extend(raw)
              return " AND ".join(parts)

          # 从 CARGO_WHERE 提取允许的 Region 集合，供 Python 层过滤逻辑复用
          ALLOWED_REGIONS = set()
          if "Region" in CARGO_WHERE and CARGO_WHERE["Region"] is not None:
              raw = CARGO_WHERE["Region"]
              ALLOWED_REGIONS = {str(r) for r in (raw if isinstance(raw, list) else [raw])}

          # 字典外置：读取本地 mapping.json 作为联赛映射字典
          LEAGUE_MAPPING = {}
          if os.path.exists("mapping.json"):
              try:
                  with open("mapping.json", "r", encoding="utf-8") as f:
                      LEAGUE_MAPPING = json.load(f)
              except Exception as e:
                  print(f"读取 mapping.json 异常: {e}", flush=True)

          RESET, RED, GREEN, YELLOW, PURPLE, BLACK = "\033[0m", "\033[91m", "\033[92m", "\033[93m", "\033[95m", "\033[30m"

          def log(level, msg, color=BLACK):
              print(f"{color}[{level}] {msg}{RESET}", flush=True)

          def apply_name_mapping(name):
              """模糊替换：name 中包含 key 片段则替换为 value，其余部分保留。"""
              for k, v in NAME_MAPPING.items():
                  if k.lower() in name.lower():
                      # 大小写不敏感替换
                      pattern = re.compile(re.escape(k), re.IGNORECASE)
                      return pattern.sub(v, name)
              return None  # 未命中

          def run_sniff():
              old_slugs = set()
              if os.path.exists(TARGET_FILE):
                  try:
                      with open(TARGET_FILE, "r", encoding="utf-8") as f:
                          old_data = json.load(f)
                          old_slugs = {item.get("slug") for item in old_data if item.get("slug")}
                  except: pass

              log("INFO", "=" * 85)
              log("INFO", f"系统初始化完成 (日期: {today_dt}) | 开始抓取赛事目录")
              log("INFO", "=" * 85)

              url = "https://lol.fandom.com/api.php"

              session = requests.Session()
              session.headers.update({"User-Agent": "LoLStatsWorker/2026 (User:HsuX)"})

              bot_user = os.environ.get("FANDOM_BOT_USERNAME")
              bot_pass = os.environ.get("FANDOM_BOT_PASSWORD")

              if bot_user and bot_pass:
                  try:
                      token_res = session.get(url, params={
                          "action": "query", "meta": "tokens", "type": "login", "format": "json"
                      }, timeout=15).json()
                      login_token = token_res.get("query", {}).get("tokens", {}).get("logintoken")

                      if login_token:
                          login_res = session.post(url, data={
                              "action": "login",
                              "lgname": bot_user,
                              "lgpassword": bot_pass,
                              "lgtoken": login_token,
                              "format": "json"
                          }, timeout=15).json()

                          if login_res.get("login", {}).get("result") == "Success":
                              log("INFO", f"Fandom API 身份认证成功 | 用户: {bot_user}", GREEN)
                          else:
                              log("WARN", f"身份认证失败，将以匿名身份继续 | 详情: {login_res}", YELLOW)
                  except Exception as e:
                      log("WARN", f"登录环节发生网络或解析异常: {e}", YELLOW)
              else:
                  log("WARN", "未检测到凭证(FANDOM_BOT_USERNAME/PASSWORD)，以匿名身份抓取", YELLOW)

              all_data = []
              offset = 0
              limit = 100
              MAX_ATTEMPTS = 5

              log("INFO", "开始执行分页抓取机制...")

              while True:
                  params = {
                      "action": "cargoquery", "format": "json", "tables": "Tournaments",
                      "fields": ", ".join(CARGO_FIELDS),
                      "where": build_where(CARGO_WHERE, CARGO_WHERE_RAW),
                      "order_by": CARGO_ORDER_BY, "limit": str(limit), "offset": str(offset)
                  }

                  page_data = []
                  for attempt in range(1, MAX_ATTEMPTS + 1):
                      try:
                          resp = session.get(url, params=params, timeout=30)
                          resp.raise_for_status()
                          resp_json = resp.json()
                          if "error" in resp_json:
                              log("WARN", f"API受限 | 重试 {attempt}/{MAX_ATTEMPTS} | 详情: {resp_json['error']}", YELLOW)
                              time.sleep(15 * attempt); continue
                          page_data = resp_json.get("cargoquery", [])
                          break
                      except Exception as e:
                          st = 15 * attempt
                          log("WARN", f"网络异常 | 重试 {attempt}/{MAX_ATTEMPTS} | 详情: {e}", YELLOW)
                          time.sleep(st)

                  if not page_data and offset == 0:
                      log("WARN", "任务中止 | 首屏即未获取到任何数据。", RED)
                      sys.exit(1)

                  if not page_data:
                      break

                  all_data.extend(page_data)
                  log("INFO", f"获取成功 | 当前 Offset: {offset:<4} | 取得数据: {len(page_data)} 条 | 累计: {len(all_data)} 条")

                  if len(page_data) < limit:
                      break

                  offset += limit
                  time.sleep(1)

              main_events, playoff_events = {}, []
              log("INFO", f"数据同步成功 | 原始数据共计 {len(all_data)} 条")
              log("INFO", "-" * 85)

              for item in all_data:
                  t = item["title"]
                  name, ov, region, y = t.get("Name", ""), t.get("OverviewPage", ""), t.get("Region", ""), t.get("Year", "")
                  league_full = t.get("League", "")

                  if t.get("IsQualifier") == "1":
                      log("INFO", f"全局拦截 | 判定为预选赛 (Qualifier) | 赛事: {name} | 联赛: {league_full}", BLACK)
                      continue
                  hit_black = next((k for k in BLACKLIST if k.lower() in name.lower()), None)
                  if hit_black:
                      log("INFO", f"全局拦截 | 命中黑名单关键词 ({hit_black}) | 赛事: {name} | 联赛: {league_full}", BLACK)
                      continue
                  hit_white = next((k for k in WHITELIST if k.upper() in ov.upper()), None)
                  if ALLOWED_REGIONS and region not in ALLOWED_REGIONS and not hit_white:
                      log("INFO", f"全局拦截 | Region ({region}) 不在目标列表且未命中白名单 | 赛事: {name} | 联赛: {league_full}", BLACK)
                      continue

                  try:
                      s_dt = datetime.strptime(t["DateStart"], '%Y-%m-%d').date()
                      e_dt = datetime.strptime(t.get("Date") or t["DateStart"], '%Y-%m-%d').date()
                  except Exception as e:
                      log("WARN", f"日期异常 | 跳过赛事 | 赛事: {name} | 报错: {e}", YELLOW)
                      continue

                  # ── 名字聚合替换（模糊匹配，ov 原值不动）──────────────────────
                  mapped_name = apply_name_mapping(name)
                  if mapped_name:
                      log("INFO", f"名字聚合 | 模糊替换命中 | '{name}' → '{mapped_name}' | OVP: {ov}", PURPLE)
                      name = mapped_name
                  # ──────────────────────────────────────────────────────────────

                  ev = {"ov": ov, "year": y, "name": name, "region": region, "start": s_dt, "end": e_dt, "league_full": league_full}
                  if t.get("IsPlayoffs") == "1" and region != "International":
                      log("INFO", f"初步准入 | 赛事已进入季后赛匹配池 | 赛事: {name} | 联赛: {league_full}", PURPLE)
                      playoff_events.append(ev)
                  else:
                      # 命中替换规则时用统一后的 name 做 key，确保多条数据落入同一抽屉
                      if mapped_name:
                          key = f"INTL_{name}" if region == "International" else f"{name}_{y}"
                      else:
                          key = f"INTL_{name}" if region == "International" else f"{ov}_{y}"

                      if key not in main_events:
                          log("INFO", f"初步准入 | 赛事已加入主赛聚合列表 | 赛事: {name} | 联赛: {league_full}", PURPLE)
                          main_events[key] = ev
                          main_events[key]["extra_ovs"] = [ov]  # 第一条 ov 直接入列，统一用 extra_ovs 管理
                      else:
                          log("INFO", f"名字聚合 | 合并入已有抽屉 | 追加 OVP: {ov} | Key: {key}", PURPLE)
                          main_events[key]["start"] = min(main_events[key]["start"], s_dt)
                          main_events[key]["end"]   = max(main_events[key]["end"],   e_dt)
                          if ov not in main_events[key]["extra_ovs"]:
                              main_events[key]["extra_ovs"].append(ov)

              log("INFO", "-" * 85)
              log("INFO", "启动季后赛数据关联匹配模块...")
              for p in playoff_events:
                  m_key = next((k for k, m in main_events.items() if m["region"] != "International" and m["year"] == p["year"] and (m["name"] in p["name"] or p["ov"].startswith(m["ov"]))), None)
                  if m_key:
                      old_end = main_events[m_key]["end"]
                      new_end = max(old_end, p["end"])
                      log("INFO", f"赛程合并 | 主赛: {main_events[m_key]['name']} | 关联季后赛: {p['name']} | 结束日期: {old_end} -> {new_end}")
                      main_events[m_key]["end"] = new_end
                      if p["ov"] not in main_events[m_key].setdefault("extra_ovs", []):
                          main_events[m_key]["extra_ovs"].append(p["ov"])
                  else:
                      log("WARN", f"独立保留 | 未发现关联主赛的季后赛 | 赛事: {p['name']}", PURPLE)
                      main_events[f"{p['ov']}_{p['year']}_PO"] = p

              log("INFO", "-" * 85)
              log("INFO", "启动生命周期终审模块...")
              final_output = []
              for v in main_events.values():
                  if v["start"] > (today_dt + timedelta(days=PREHEAT_DAYS)):
                      diff_days = (v["start"] - today_dt).days
                      log("INFO", f"周期拦截 | 距离开赛 {diff_days:>3} 天 (阈值 {PREHEAT_DAYS} 天) | 赛事: {v['name']} | 联赛: {v.get('league_full', '')}", YELLOW)
                      continue
                  if today_dt > (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      diff_days = (today_dt - v["end"]).days
                      log("INFO", f"周期拦截 | 已经结束 {diff_days:>3} 天 (阈值 {EXPIRE_DAYS} 天) | 赛事: {v['name']} | 联赛: {v.get('league_full', '')}", YELLOW)
                      continue

                  if v["end"] < today_dt <= (v["end"] + timedelta(days=EXPIRE_DAYS)):
                      log("INFO", f"周期放行 | 赛事已结束但仍在宽限期内 | 赛事: {v['name']} | 联赛: {v.get('league_full', '')}")

                  # 联赛简写映射逻辑 (依赖外置 mapping.json，包含即替换)
                  original_league = v.get("league_full", "")
                  league_short = original_league  # 默认输出原名

                  for k, map_val in LEAGUE_MAPPING.items():
                      if k in original_league:
                          league_short = str(map_val)
                          break
                  
                  if not league_short:
                      # 兜底：如果 API 连 league_full 都没给（为空），用赛事名兜底避免产出空值
                      league_short = v["name"]

                  lp_name = v["name"]
                  slug = lp_name.lower().replace(" ", "-")

                  log("INFO", f"确认准入 | 赛事: {lp_name} | 联赛: {original_league} -> {league_short}", GREEN)

                  final_output.append({
                      "slug": slug,
                      "name": lp_name,
                      "league": league_short,
                      "overview_page": v.get("extra_ovs", [v["ov"]]),
                      "start_date": str(v["start"]),
                      "end_date": str(v["end"])
                  })

              # 读取本地已有数据，将未过期的条目作为基底保留
              base_dict = {}
              if os.path.exists(TARGET_FILE):
                  try:
                      with open(TARGET_FILE, "r", encoding="utf-8") as f:
                          existing = json.load(f)
                      for item in existing:
                          try:
                              e_dt = datetime.strptime(item["end_date"], "%Y-%m-%d").date()
                              if today_dt <= (e_dt + timedelta(days=EXPIRE_DAYS)):
                                  base_dict[item["slug"]] = item
                          except:
                              pass
                  except Exception as e:
                      log("WARN", f"读取本地缓存异常: {e}", YELLOW)

              # 用本次 API 新数据覆盖基底（新数据优先），end_date 决定淘汰
              unique_dict = {item["slug"]: item for item in final_output}
              merged = {**base_dict, **unique_dict}
              unique_res = sorted(merged.values(), key=lambda x: x['slug'])

              with open(TARGET_FILE, "w", encoding="utf-8") as f:
                  json.dump(unique_res, f, indent=4, ensure_ascii=False)

              new_s = {item["slug"] for item in unique_res}
              diff = [f"➕ {s}" for s in sorted(new_s - old_slugs)] + [f"➖ {s}" for s in sorted(old_slugs - new_s)]

              if len(diff) > 5:
                  commit_msg = f"📊 Data Sync: 新增 {len(new_s - old_slugs)} 项, 移除 {len(old_slugs - new_s)} 项"
              elif diff:
                  commit_msg = f"📊 Data Sync: {' | '.join(diff)}"
              else:
                  commit_msg = "🔄 Data Sync: no changes"

              if "GITHUB_OUTPUT" in os.environ:
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write(f"commit_msg={commit_msg}\n")

          if __name__ == "__main__":
              run_sniff()

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          file_pattern: ${{ env.TARGET_FILENAME }}
