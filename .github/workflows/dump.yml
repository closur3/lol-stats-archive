name: "Dump: Backup Stats"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Backup Stats
        id: process_data
        env:
          WORKER_URL: "https://lol.hsux.de/backup"
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          TIMEZONE: "Asia/Shanghai"
        run: |
          node --input-type=module <<'NODE'
          import { mkdir, rm, writeFile } from "node:fs/promises";
          import { generateMarkdown } from "./src/markdown/markdownRenderer.js";

          const url = process.env.WORKER_URL;
          if (!url) throw new Error("WORKER_URL missing");

          const headers = {};
          if (process.env.ADMIN_SECRET) headers.Authorization = `Bearer ${process.env.ADMIN_SECRET}`;

          console.log(`🚀 开始抓取: ${url}`);
          const response = await fetch(url, { headers });
          if (!response.ok) throw new Error(`Backup request failed: ${response.status} ${await response.text()}`);
          const data = await response.json();
          if (!data || typeof data !== "object" || Array.isArray(data)) throw new Error("Backup payload must be object");
          if (!data.home || typeof data.home !== "object" || Array.isArray(data.home)) throw new Error("Backup payload home must be object");
          if (!data.archive || typeof data.archive !== "object" || Array.isArray(data.archive)) throw new Error("Backup payload archive must be object");
          if (!Array.isArray(data.configArchive)) throw new Error("Backup payload configArchive must be array");

          const targetTimeZone = process.env.TIMEZONE || "Asia/Shanghai";
          function formatDateParts(date) {
            const parts = new Intl.DateTimeFormat("en-CA", {
              timeZone: targetTimeZone,
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
              hour12: false
            }).formatToParts(date).reduce((acc, part) => {
              acc[part.type] = part.value;
              return acc;
            }, {});
            return `${parts.year.slice(2)}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}`;
          }

          function formatHour(date) {
            const parts = new Intl.DateTimeFormat("en-CA", {
              timeZone: targetTimeZone,
              hour: "2-digit",
              hour12: false
            }).formatToParts(date).reduce((acc, part) => {
              acc[part.type] = part.value;
              return acc;
            }, {});
            return String(parts.hour).padStart(2, "0");
          }

          function convertUtcMarkdownToLocal(markdown) {
            return markdown
              .replace(/(\d{2})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/g, (_match, yy, mm, dd, hh, min) => {
                return formatDateParts(new Date(`20${yy}-${mm}-${dd}T${hh}:${min}:00Z`));
              })
              .replace(/\*\*(\d{2}):00\*\*/g, (_match, hh) => {
                return `**${formatHour(new Date(`2026-01-01T${hh}:00:00Z`))}:00**`;
              });
          }

          await rm("markdown", { recursive: true, force: true });
          await mkdir("markdown", { recursive: true });
          await mkdir("config", { recursive: true });

          const written = new Set();
          async function writeSnapshotMarkdown(slug, snapshot) {
            if (!snapshot?.tournament || snapshot.tournament.slug !== slug) throw new Error(`Invalid backup snapshot: ${slug}`);
            if (!snapshot.stats || typeof snapshot.stats !== "object" || Array.isArray(snapshot.stats)) throw new Error(`Invalid backup stats: ${slug}`);
            if (!snapshot.timeGrid || typeof snapshot.timeGrid !== "object" || Array.isArray(snapshot.timeGrid)) throw new Error(`Invalid backup timeGrid: ${slug}`);
            if (written.has(slug)) throw new Error(`Duplicate markdown slug: ${slug}`);
            const markdown = convertUtcMarkdownToLocal(generateMarkdown(snapshot.tournament, snapshot.stats, { [slug]: snapshot.timeGrid }));
            await writeFile(`markdown/${slug}.md`, markdown, "utf8");
            written.add(slug);
            console.log(`📝 [写入] markdown/${slug}.md`);
          }

          for (const [slug, snapshot] of Object.entries(data.home).sort()) {
            await writeSnapshotMarkdown(slug, snapshot);
          }
          for (const [slug, snapshot] of Object.entries(data.archive).sort()) {
            await writeSnapshotMarkdown(slug, snapshot);
          }
          await writeFile("config/archive.json", `${JSON.stringify(data.configArchive, null, 2)}\n`, "utf8");
          console.log("📝 [写入] config/archive.json");
          console.log(`\n✅ 处理完成。共写入 ${written.size + 1} 个文件。`);
          NODE
        shell: bash

      - name: Build Commit Message
        id: commit_meta
        shell: bash
        run: |
          commit_msg=$(git status --porcelain -- 'markdown' 'config/archive.json' | awk '
            {
              code=$1; f=$2;
              if (code=="R" || code=="RM" || code=="RD") f=$3;
              sub(".*/","",f); sub(/\.[^.]+$/, "", f);
              s=substr(code,1,1);
              if (code=="??" || s=="A") a[++na]=f;
              else if (s=="M") m[++nm]=f;
              else if (s=="D") d[++nd]=f;
              else m[++nm]=f;
            }
            END {
              n=na+nm+nd
              if (n==0) { print "📁 Dump: no changes"; exit }
              out=""
              if (na>0) {
                add="+ "
                for (i=1;i<=na;i++) add=add (i>1?" / ":"") a[i]
                out=add
              }
              if (nm>0) {
                mod="~ "
                for (i=1;i<=nm;i++) mod=mod (i>1?" / ":"") m[i]
                out=out (length(out)>0?" | ":"") mod
              }
              if (nd>0) {
                del="- "
                for (i=1;i<=nd;i++) del=del (i>1?" / ":"") d[i]
                out=out (length(out)>0?" | ":"") del
              }
              print "📁 Dump: " out
            }')
          echo "commit_msg=$commit_msg" >> "$GITHUB_OUTPUT"

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ steps.commit_meta.outputs.commit_msg }}"
          file_pattern: "markdown/*.md config/archive.json"
