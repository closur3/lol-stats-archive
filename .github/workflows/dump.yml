name: Dump

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: '是否强制更新所有文件 (忽略内容对比)'
        required: false
        type: boolean
        default: false

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and Smart Update
        id: process_data
        env:
          WORKER_URL: "https://lol-stats.closur3.workers.dev/backup"
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: |
          import requests
          import os
          import re
          from datetime import datetime

          url = os.environ.get("WORKER_URL")
          force_update = os.environ.get("FORCE_UPDATE") == "true"
          
          if not url:
              print("❌ 错误: WORKER_URL 环境变量未设置")
              exit(1)

          if force_update:
              print("⚠️  检测到【强制更新】模式：将跳过对比，直接覆盖所有文件")

          TIME_PATTERN = re.compile(r"^Updated:.*\(CST\)$", re.MULTILINE)

          print(f"🚀 开始抓取: {url}")

          try:
              resp = requests.get(url, timeout=30)
              resp.raise_for_status()
              data = resp.json()
              
              if not isinstance(data, dict):
                  print("❌ 错误: Worker 返回的数据格式不是预期的 JSON 对象")
                  exit(1)

              changes_count = 0
              created_files = []
              updated_files = []

              for file_path, raw_template in data.items():
                  os.makedirs(os.path.dirname(file_path), exist_ok=True)
                  
                  clean_new = TIME_PATTERN.sub("", raw_template).strip()
                  
                  should_write = False
                  
                  if not os.path.exists(file_path):
                      print(f"✨ [新建] {file_path}")
                      should_write = True
                      created_files.append(file_path)
                  elif force_update:
                      print(f"🔄 [强制] {file_path}")
                      should_write = True
                      updated_files.append(file_path)
                  else:
                      with open(file_path, "r", encoding="utf-8") as f:
                          old_content = f.read()
                      clean_old = TIME_PATTERN.sub("", old_content).strip()
                      
                      if clean_old != clean_new:
                          print(f"⚡ [更新] {file_path}: 检测到比赛数据或排名变动")
                          should_write = True
                          updated_files.append(file_path)
                      else:
                          print(f"💤 [跳过] {file_path}: 数据与本地一致 (仅时间戳不同)")

                  if should_write:
                      with open(file_path, "w", encoding="utf-8") as f:
                          f.write(raw_template)
                      changes_count += 1
              
              print(f"\n✅ 处理完成。共更新/新建 {changes_count} 个文件。")

              diff = [f"+ {os.path.basename(f)}" for f in created_files] + [f"~ {os.path.basename(f)}" for f in updated_files]
              
              if len(diff) > 5:
                  commit_msg = f"📁 Dump: +{len(created_files)}, ~{len(updated_files)}"
              elif diff:
                  commit_msg = f"📁 Dump: {' | '.join(diff)}"
              else:
                  commit_msg = "🔄 Dump: no changes"

              if "GITHUB_OUTPUT" in os.environ:
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write(f"commit_msg={commit_msg}\n")

          except Exception as e:
              print(f"❌ 脚本执行发生错误: {e}")
              exit(1)
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          file_pattern: 'markdown/*.md'
