name: Archive Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    # --- 新增：强制更新选项框 ---
    inputs:
      force_update:
        description: '是否强制更新所有文件 (忽略内容对比)'
        required: false
        type: boolean
        default: false

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and Smart Update
        env:
          WORKER_URL: "https://lol-stats.closur3.workers.dev/backup"
          # --- 新增：将输入参数传递给 Python ---
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: |
          import requests
          import os
          import re
          from datetime import datetime, timedelta, timezone

          # --- 1. 获取配置 ---
          cst_tz = timezone(timedelta(hours=8))
          now_cst = datetime.now(cst_tz).strftime("%Y-%m-%d %H:%M:%S")
          
          url = os.environ.get("WORKER_URL")
          # 获取强制更新布尔值 (GitHub 传递过来的是字符串 "true" 或 "false")
          force_update = os.environ.get("FORCE_UPDATE") == "true"
          
          if not url:
              print("❌ 错误: WORKER_URL 环境变量未设置")
              exit(1)

          if force_update:
              print("⚠️  检测到【强制更新】模式：将跳过对比，直接覆盖所有文件")

          # --- 2. 正则配置 ---
          TIME_PATTERN = re.compile(r"^Updated:.*\(CST\)$", re.MULTILINE)

          print(f"🚀 开始抓取: {url}")

          try:
              resp = requests.get(url, timeout=30)
              resp.raise_for_status()
              data = resp.json()
              
              changes_count = 0

              for file_path, raw_template in data.items():
                  os.makedirs(os.path.dirname(file_path), exist_ok=True)
                  
                  # A. 准备新数据的“指纹”
                  clean_new = TIME_PATTERN.sub("", raw_template).strip()
                  
                  should_write = False
                  
                  # B. 判断逻辑
                  if not os.path.exists(file_path):
                      print(f"✨  [新建] {file_path}")
                      should_write = True
                  elif force_update:
                      print(f"🔄  [强制] {file_path}")
                      should_write = True
                  else:
                      # 读取本地旧文件进行指纹比对
                      with open(file_path, "r", encoding="utf-8") as f:
                          old_content = f.read()
                      clean_old = TIME_PATTERN.sub("", old_content).strip()
                      
                      if clean_old != clean_new:
                          print(f"⚡  [更新] {file_path}: 检测到数据变动")
                          should_write = True
                      else:
                          print(f"跳过] {file_path}: 比赛数据无变化")

                  # === 写入逻辑 ===
                  if should_write:
                      final_content = raw_template.replace("{{UPDATED_TIME}}", now_cst)
                      with open(file_path, "w", encoding="utf-8") as f:
                          f.write(final_content)
                          changes_count += 1
              
              print(f"\n处理完成。共更新 {changes_count} 个文件。")

          except Exception as e:
              print(f"❌ 脚本执行发生错误: {e}")
              exit(1)
        shell: python

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🗃️ Auto: Archive stats (forced: ${{ github.event.inputs.force_update }})"
          file_pattern: 'tournament/*.md'
