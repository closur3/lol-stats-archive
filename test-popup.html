<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹窗样式模拟</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f1f5f9; padding: 20px; }
        
        .modal { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .modal-content { background: #fff; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 90%; max-width: 420px; max-height: 80vh; overflow: hidden; }
        .modal-header { padding: 20px 24px; background: #f8fafc; border-bottom: 1px solid #f1f5f9; font-size: 18px; font-weight: 800; color: #0f172a; }
        .modal-list { padding: 16px 24px; overflow-y: auto; max-height: 60vh; }
        
        .section-header { padding: 8px 16px; font-weight: 700; font-size: 13px; border-radius: 8px 8px 0 0; margin-bottom: 0; }
        .section-finished { background: #f0fdf4; color: #166534; border: 1px solid #86efac; border-bottom: none; }
        .section-upcoming { background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; border-bottom: none; margin-top: 16px; }
        
        .match-item { display: flex; align-items: center; background: #fff; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 8px; padding: 12px 16px; }
        .match-item:first-of-type { border-top-left-radius: 0; border-top-right-radius: 0; }
        
        .col-date { width: 60px; font-size: 13px; color: #64748b; font-weight: 600; text-align: center; }
        .col-vs-area { flex: 1; text-align: center; font-weight: 700; }
        .col-score { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 4px 8px; font-weight: 800; margin: 0 8px; }
        .col-score.is-full { background: #fff7ed; border-color: #fdba74; color: #c2410c; }
    </style>
</head>
<body>
    <div class="modal">
        <div class="modal-content">
            <div class="modal-header">BLG - 时间表</div>
            <div class="modal-list">
                <!-- 已结束区域 -->
                <div class="section-header section-finished">✅ 已结束 (3)</div>
                <div class="match-item">
                    <div class="col-date">01-15<br>14:30</div>
                    <div class="col-vs-area">
                        BLG <div class="col-score is-full">2-1</div> GEN
                    </div>
                </div>
                <div class="match-item">
                    <div class="col-date">01-12<br>19:00</div>
                    <div class="col-vs-area">
                        T1 <div class="col-score">2-0</div> BLG
                    </div>
                </div>
                <div class="match-item">
                    <div class="col-date">01-08<br>16:00</div>
                    <div class="col-vs-area">
                        BLG <div class="col-score">2-1</div> EDG
                    </div>
                </div>
                
                <!-- 未开始区域 -->
                <div class="section-header section-upcoming">📅 未开始 (2)</div>
                <div class="match-item">
                    <div class="col-date">01-20<br>14:00</div>
                    <div class="col-vs-area">
                        BLG <div class="col-score">VS</div> WBG
                    </div>
                </div>
                <div class="match-item">
                    <div class="col-date">01-25<br>19:00</div>
                    <div class="col-vs-area">
                        JDG <div class="col-score">VS</div> BLG
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
